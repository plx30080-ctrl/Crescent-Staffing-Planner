<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Firebase configuration
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyD2ySRicFt2-Zd2JRaW0ZHHb97gzwgcdWg",
            authDomain: "staffingtool-1ab4f.firebaseapp.com",
            databaseURL: "https://staffingtool-1ab4f-default-rtdb.firebaseio.com",
            projectId: "staffingtool-1ab4f",
            storageBucket: "staffingtool-1ab4f.firebasestorage.app",
            messagingSenderId: "956290053379",
            appId: "1:956290053379:web:2611b6db69ef2c9b2de536",
            measurementId: "G-HFR8KR0HMQ"
        };

        let db = null;
        let isFirebaseConfigured = false;

        // Check if Firebase is configured
        try {
            const configuredKeys = Object.values(FIREBASE_CONFIG).filter(v => !v.startsWith('YOUR_'));
            if (configuredKeys.length === Object.keys(FIREBASE_CONFIG).length) {
                firebase.initializeApp(FIREBASE_CONFIG);
                db = firebase.database();  // Using Realtime Database instead of Firestore
                isFirebaseConfigured = true;
                console.log('Firebase Realtime Database initialized successfully');
            } else {
                console.warn('Firebase not configured. Using localStorage only.');
            }
        } catch (error) {
            console.error('Firebase initialization error:', error);
        }

        // Storage utilities
        const storage = {
            save: (key, data) => {
                try { localStorage.setItem(key, JSON.stringify(data)); }
                catch (e) { console.error('localStorage save failed (quota?):', e); }
            },
            load: (key, defaultValue = null) => {
                try {
                    const item = localStorage.getItem(key);
                    return item ? JSON.parse(item) : defaultValue;
                } catch (e) { console.error('localStorage load failed:', e); return defaultValue; }
            },
            remove: (key) => { try { localStorage.removeItem(key); } catch(e) {} }
        };

        // ===== Associate status (suspensions / DNR / early leaves) =====
        // Workweek is Mon-Thu. A suspension is served for 5 working days; the
        // associate may return on the date that is 5 working days after issuance.
        const STATUS_WORKING_DAYS = [1, 2, 3, 4]; // 0=Sun ... 6=Sat
        const SUSPENSION_WORKING_DAYS = 5;

        const normalizeName = (s) => (s || '').toString().toLowerCase()
            .replace(/[.,]/g, ' ').replace(/\s+/g, ' ').trim();
        const nameTokenKey = (s) => normalizeName(s).split(' ').filter(Boolean).sort().join(' ');
        const normalizeEid = (v) => (v == null ? '' : v.toString().replace(/[^0-9]/g, '').trim());

        // "Tyler Powe" -> "Powe, Tyler" for display (last whitespace token = surname).
        // Leaves single names and already-comma'd names untouched.
        const formatLastFirst = (name) => {
            const n = (name || '').toString().trim();
            if (!n || n.includes(',')) return n;
            const parts = n.split(/\s+/);
            if (parts.length < 2) return n;
            return `${parts[parts.length - 1]}, ${parts.slice(0, -1).join(' ')}`;
        };
        // Surname sort key (case-insensitive) for alphabetizing by last name.
        const lastNameKey = (name) => {
            const n = (name || '').toString().trim();
            if (!n) return '';
            if (n.includes(',')) return n.split(',')[0].trim().toLowerCase();
            const parts = n.split(/\s+/);
            return (parts.length > 1 ? parts[parts.length - 1] : parts[0]).toLowerCase();
        };

        const parseSheetDate = (v) => {
            if (v == null || v === '') return null;
            if (v instanceof Date) return isNaN(v) ? null : v;
            // Excel serial date. Power Automate's Excel connector sends date cells as
            // serials — sometimes as numbers, sometimes as numeric STRINGS (e.g. "46177"
            // = 2026-06-04). Decode both; otherwise new Date("46177") yields garbage.
            const serial = (typeof v === 'number') ? v
                : (/^\d+(\.\d+)?$/.test(v.toString().trim()) ? Number(v.toString().trim()) : NaN);
            if (!isNaN(serial) && serial >= 20000 && serial <= 80000) {
                const d = new Date(Math.round((serial - 25569) * 86400 * 1000));
                if (isNaN(d)) return null;
                // d is UTC midnight; rebuild as a LOCAL date so the calendar day is
                // correct in negative-offset timezones (avoids an off-by-one).
                return new Date(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
            }
            const s = v.toString().trim();
            const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
            if (m) {
                const yr = m[3].length === 2 ? '20' + m[3] : m[3];
                const d = new Date(Number(yr), Number(m[1]) - 1, Number(m[2]));
                return isNaN(d) ? null : d;
            }
            // Parse ISO YYYY-MM-DD as a LOCAL date (new Date('2026-07-06') is UTC,
            // which shifts back a day in negative-offset timezones).
            const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
            if (iso) {
                const d = new Date(Number(iso[1]), Number(iso[2]) - 1, Number(iso[3]));
                return isNaN(d) ? null : d;
            }
            const d = new Date(s);
            return isNaN(d) ? null : d;
        };
        const toISODate = (d) => {
            const date = (d instanceof Date) ? d : parseSheetDate(d);
            if (!date) return '';
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        };
        const formatShortDate = (d) => {
            const date = (d instanceof Date) ? d : parseSheetDate(d);
            if (!date) return '';
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            // Show the year only when it isn't the current one, so a stray
            // future-dated suspension (bad source data) is obvious at a glance.
            const yr = date.getFullYear() !== new Date().getFullYear() ? `/${String(date.getFullYear()).slice(-2)}` : '';
            return `${days[date.getDay()]} ${date.getMonth() + 1}/${date.getDate()}${yr}`;
        };

        // Return date = SUSPENSION_WORKING_DAYS Mon-Thu days after issuance.
        const computeSuspensionReturn = (issuanceDate) => {
            const start = (issuanceDate instanceof Date) ? new Date(issuanceDate) : parseSheetDate(issuanceDate);
            if (!start) return null;
            const d = new Date(start);
            let counted = 0;
            while (counted < SUSPENSION_WORKING_DAYS) {
                d.setDate(d.getDate() + 1);
                if (STATUS_WORKING_DAYS.includes(d.getDay())) counted++;
            }
            return d;
        };

        const STATUS_RANK = { terminated: 3, dnr: 3, suspended: 2, none: 0 };
        const correctiveToStatus = (raw) => {
            const s = (raw || '').toString().trim().toLowerCase();
            if (!s) return null;
            if (s.includes('dnr') || s.includes('do not return')) return 'dnr';
            if (s.includes('termin')) return 'terminated';
            if (s.includes('suspen')) return 'suspended';
            return null; // "None" / blank are not blocking
        };

        // Effective status for an entry today. Returns null if not currently flagged.
        const resolveEntryStatus = (entry, today = new Date()) => {
            if (!entry || !entry.status || entry.status === 'none') return null;
            if (entry.status === 'dnr' || entry.status === 'terminated') {
                const isDnr = entry.status === 'dnr';
                return {
                    kind: entry.status, blocked: true, permanent: true,
                    label: isDnr ? 'DNR' : 'TERMINATED', shortLabel: isDnr ? 'DNR' : 'TERM',
                    className: isDnr ? 'flag-dnr' : 'flag-terminated'
                };
            }
            // suspended
            const ret = entry.returnDate ? parseSheetDate(entry.returnDate) : null;
            const todayMid = new Date(today.getFullYear(), today.getMonth(), today.getDate());
            if (ret) {
                const retMid = new Date(ret.getFullYear(), ret.getMonth(), ret.getDate());
                if (todayMid >= retMid) return null; // suspension already served
                // A 5-working-day suspension can't return more than ~2 weeks out. A
                // return far in the future means a bad issued date in the source data
                // (e.g. a 2-digit year like "36" → 2036). Flag it instead of blocking
                // a clean associate for years.
                if ((retMid - todayMid) / 86400000 > 30) {
                    return {
                        kind: 'suspended', blocked: false, permanent: false, dataError: true,
                        until: entry.returnDate,
                        label: `SUSPENDED? check issued date (${formatShortDate(entry.issuedDate)} → returns ${formatShortDate(ret)})`,
                        shortLabel: 'DATE?', className: 'flag-suspended'
                    };
                }
            }
            return {
                kind: 'suspended', blocked: true, permanent: false, until: entry.returnDate,
                label: ret ? `SUSPENDED until ${formatShortDate(ret)}` : 'SUSPENDED',
                shortLabel: 'SUSP', className: 'flag-suspended'
            };
        };

        // Build lookup indexes (blocking entries only) for inline matching. Keyed
        // by name (typed) and by EID (scanned badge) so both staffing-entry styles work.
        const buildStatusNameIndex = (statusList) => {
            const byName = {}, byToken = {}, byEid = {};
            Object.values(statusList || {}).forEach(entry => {
                if (!resolveEntryStatus(entry)) return;
                if (entry.eid) byEid[normalizeEid(entry.eid)] = entry;
                if (entry.name) {
                    byName[normalizeName(entry.name)] = entry;
                    byToken[nameTokenKey(entry.name)] = entry;
                }
            });
            return { byName, byToken, byEid };
        };
        // Accepts either a typed name or a scanned EID (a run of digits).
        const lookupNameStatus = (index, value) => {
            if (!index || !value) return null;
            const raw = value.toString().trim();
            let entry = null;
            if (/^\d{4,}$/.test(raw.replace(/\s+/g, ''))) {
                entry = index.byEid[normalizeEid(raw)];
            }
            if (!entry) entry = index.byName[normalizeName(raw)] || index.byToken[nameTokenKey(raw)];
            return entry ? { entry, status: resolveEntryStatus(entry) } : null;
        };

        // Index of where each associate last worked, from saved staffing reports:
        // normalized name -> { name, leads[], leadLabel, letter, date, shift }. Used to
        // route people back to the lead they usually work for, even on a different line.
        const buildWorkHistoryIndex = (reports) => {
            const idx = {};
            (reports || []).forEach(r => {
                const date = r.date || '';
                const shift = r.shift || '';
                (r.lines || []).forEach(line => {
                    const leads = (line.leads || []).filter(Boolean);
                    if (!leads.length) return; // no lead to attribute the work to
                    const letter = line.letter || '';
                    (line.positions || []).forEach(p => {
                        const nm = (p.name || '').trim();
                        if (!nm) return;
                        const key = normalizeName(nm);
                        const cur = idx[key];
                        if (!cur || date > cur.date) {
                            idx[key] = { name: nm, leads, leadLabel: leads.join(', '), letter, date, shift };
                        }
                    });
                });
            });
            return idx;
        };
        const lookupWorkHistory = (index, name) => {
            if (!index || !name) return null;
            return index[normalizeName(name)] || null;
        };

        // Resolve normalized records (one or more per EID) into an EID-keyed
        // status list. DNR/Termination outrank suspensions; ties break to the
        // most recent date. Shared by the manual upload and the SharePoint sync.
        const resolveStatusRecords = (records, earlyLeaves) => {
            const resolved = {};
            records.forEach(rec => {
                const cur = resolved[rec.eid];
                const recRank = STATUS_RANK[rec.status] || 0;
                if (!cur) { resolved[rec.eid] = { ...rec }; return; }
                const curRank = STATUS_RANK[cur.status] || 0;
                if (recRank > curRank || (recRank === curRank && (rec.date || '') >= (cur.date || ''))) {
                    resolved[rec.eid] = { ...rec, name: rec.name || cur.name };
                } else if (!cur.name && rec.name) {
                    cur.name = rec.name;
                }
            });
            const statusList = {};
            Object.keys(resolved).forEach(eid => {
                const e = resolved[eid];
                const out = {
                    eid, name: e.name || (earlyLeaves[eid] && earlyLeaves[eid].name) || '',
                    status: e.status, offense: e.offense || '', issuedDate: e.date || '',
                    earlyLeaveCount: earlyLeaves[eid] ? earlyLeaves[eid].count : 0
                };
                if (e.status === 'suspended') out.returnDate = toISODate(computeSuspensionReturn(e.date));
                statusList[eid] = out;
            });
            // EIDs with only early leaves (informational, not blocking).
            Object.keys(earlyLeaves).forEach(eid => {
                if (statusList[eid]) return;
                statusList[eid] = {
                    eid, name: earlyLeaves[eid].name, status: 'none',
                    earlyLeaveCount: earlyLeaves[eid].count, issuedDate: earlyLeaves[eid].lastDate
                };
            });
            return statusList;
        };

        // Resolve the raw { submissions, corrective } payload (the canonical shape
        // written by both the Power Automate sync and the manual upload) into a
        // status list + meta. Field names match SYNC-AND-AUTH-SETUP.md.
        const resolveStatusRaw = (raw) => {
            const submissions = (raw && Array.isArray(raw.submissions)) ? raw.submissions : [];
            const corrective = (raw && Array.isArray(raw.corrective)) ? raw.corrective : [];
            const records = [];
            const earlyLeaves = {};
            // Tolerant field lookup: accept the clean names from the Power Automate
            // Select step OR the original Excel header names, case/spacing-insensitive.
            const pick = (row, ...names) => {
                const lk = {};
                Object.keys(row || {}).forEach(k => { lk[k.toLowerCase().replace(/[^a-z0-9]/g, '')] = row[k]; });
                for (const n of names) {
                    const key = n.toLowerCase().replace(/[^a-z0-9]/g, '');
                    if (lk[key] != null && lk[key] !== '') return lk[key];
                }
                return '';
            };
            const ingest = (row, isSubmission) => {
                const eid = normalizeEid(pick(row, 'eid', 'employeeid', 'badgeid'));
                if (!eid) return;
                const name = (pick(row, 'name', 'associatename') || '').toString().trim();
                const isoDate = toISODate(parseSheetDate(pick(row, 'date')));
                const status = correctiveToStatus(pick(row, 'action', 'correctiveaction'));
                if (status) {
                    const offense = (pick(row, 'offense', 'offensecategory', 'reason', 'category') || '').toString().trim();
                    records.push({ eid, name, status, date: isoDate, offense });
                } else if (isSubmission) {
                    const timeLeft = (pick(row, 'timeleft') || '').toString().trim();
                    const category = (pick(row, 'category') || '').toString().trim();
                    if (timeLeft || category) {
                        const el = earlyLeaves[eid] || { count: 0, name: '', lastDate: '' };
                        el.count += 1;
                        if (name) el.name = name;
                        if (isoDate > el.lastDate) el.lastDate = isoDate;
                        earlyLeaves[eid] = el;
                    }
                }
            };
            submissions.forEach(r => ingest(r, true));
            corrective.forEach(r => ingest(r, false));
            const statusList = resolveStatusRecords(records, earlyLeaves);
            const blockingCount = Object.values(statusList).filter(e => resolveEntryStatus(e)).length;
            return {
                statusList,
                meta: {
                    updatedAt: (raw && raw.updatedAt) || new Date().toISOString(),
                    source: (raw && raw.source) || 'sharepoint-sync',
                    totalEntries: Object.keys(statusList).length,
                    blockingCount
                }
            };
        };

        // Parse the manually-uploaded SharePoint workbook into the same raw
        // { submissions, corrective } shape the Power Automate sync writes, so both
        // ingestion paths funnel through resolveStatusRaw.
        const parseStatusWorkbook = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const wb = XLSX.read(data, { type: 'array' });
                        const findHeader = (headers, ...wanted) => {
                            const norm = headers.map(h => (h || '').toString().toLowerCase().replace(/[^a-z0-9]/g, ''));
                            for (const w of wanted) {
                                const wn = w.toLowerCase().replace(/[^a-z0-9]/g, '');
                                const idx = norm.findIndex(h => h === wn || h.startsWith(wn));
                                if (idx !== -1) return headers[idx];
                            }
                            return null;
                        };

                        const submissions = [];
                        const corrective = [];

                        wb.SheetNames.forEach(sheetName => {
                            const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { defval: '' });
                            if (!rows.length) return;
                            const headers = Object.keys(rows[0]);
                            const eidKey = findHeader(headers, 'eid', 'employeeid', 'badgeid', 'badge');
                            if (!eidKey) return; // not a sheet we understand
                            const nameKey = findHeader(headers, 'associatename', 'name');
                            const caKey = findHeader(headers, 'correctiveaction');
                            const dateKey = findHeader(headers, 'date');
                            const offenseKey = findHeader(headers, 'offensecategory');
                            const reasonKey = findHeader(headers, 'reason');
                            const timeLeftKey = findHeader(headers, 'timeleft');
                            const categoryKey = findHeader(headers, 'category');
                            const isSubmissionSheet = !!timeLeftKey; // event log has a "Time Left" column
                            const get = (row, key) => (key ? (row[key] || '').toString() : '');

                            rows.forEach(row => {
                                if (!normalizeEid(row[eidKey])) return;
                                const base = {
                                    eid: get(row, eidKey),
                                    name: get(row, nameKey),
                                    action: get(row, caKey),
                                    date: get(row, dateKey)
                                };
                                if (isSubmissionSheet) {
                                    submissions.push({ ...base, category: get(row, categoryKey), reason: get(row, reasonKey), timeLeft: get(row, timeLeftKey) });
                                } else {
                                    corrective.push({ ...base, offense: get(row, offenseKey) });
                                }
                            });
                        });

                        if (!submissions.length && !corrective.length) {
                            reject(new Error('No EID data found. Check that the file has an "EID" column.'));
                            return;
                        }

                        const raw = { submissions, corrective, updatedAt: new Date().toISOString(), source: 'manual-upload', fileName: file.name };
                        resolve({ raw, meta: resolveStatusRaw(raw).meta });
                    } catch (err) {
                        reject(new Error('Failed to parse status file: ' + err.message));
                    }
                };
                reader.onerror = () => reject(new Error('Failed to read file'));
                reader.readAsArrayBuffer(file);
            });
        };

        function App() {
            const [activeTab, setActiveTab] = useState('setup');
            const [currentDate, setCurrentDate] = useState(new Date().toISOString().split('T')[0]);
            const [currentShift, setCurrentShift] = useState('1st');
            const [lines, setLines] = useState([]);
            const [waitlist, setWaitlist] = useState([]);
            const [coreAssociates, setCoreAssociates] = useState({});
            const [lineLeadNotes, setLineLeadNotes] = useState({});
            const [saveStatus, setSaveStatus] = useState('');
            const [firebaseStatus, setFirebaseStatus] = useState(isFirebaseConfigured ? 'connected' : 'offline');
            const [isLocked, setIsLocked] = useState(false);
            const [undoStack, setUndoStack] = useState([]);
            const [undoMessage, setUndoMessage] = useState('');
            const [supervisorShift, setSupervisorShift] = useState(() => storage.load('supervisorShift', ''));
            const [showShiftModal, setShowShiftModal] = useState(() => !storage.load('supervisorShift', ''));
            const [shiftModalDraft, setShiftModalDraft] = useState('1st');
            const importInputRef = useRef(null);
            const [importStatus, setImportStatus] = useState('');
            const [statusList, setStatusList] = useState({});
            const [statusMeta, setStatusMeta] = useState(null);
            const [workHistoryIndex, setWorkHistoryIndex] = useState({});
            const saveTimeoutRef = useRef(null);
            const savingRef = useRef(false);
            const undoTimerRef = useRef(null);
            const isLoadingRef = useRef(false);
            const [roster, setRoster] = useState({});

            // Load roster from Firebase / localStorage
            useEffect(() => {
                const loadRoster = async () => {
                    if (isFirebaseConfigured && db) {
                        try {
                            const snap = await db.ref('roster/associates').once('value');
                            if (snap.exists()) { setRoster(snap.val()); return; }
                        } catch (e) { console.error('Error loading roster:', e); }
                    }
                    const saved = storage.load('roster', {});
                    setRoster(saved);
                };
                loadRoster();
            }, []);

            const handleSyncRoster = (updatedRoster) => {
                setRoster(updatedRoster);
            };

            const handleUpdateAssociate = async (employeeId, fields) => {
                const updated = { ...roster, [employeeId]: { ...roster[employeeId], ...fields } };
                setRoster(updated);
                storage.save('roster', updated);
                if (isFirebaseConfigured && db) {
                    const patch = {};
                    Object.entries(fields).forEach(([k, v]) => { patch[`roster/associates/${employeeId}/${k}`] = v; });
                    try { await db.ref('/').update(patch); } catch (e) { console.error('Error updating associate:', e); }
                }
            };

            // Load core associates from Firebase and localStorage
            useEffect(() => {
                const loadCoreAssociates = async () => {
                    // Try Firebase first
                    if (isFirebaseConfigured && db) {
                        try {
                            const snapshot = await db.ref('settings/coreAssociates').once('value');
                            if (snapshot.exists()) {
                                const data = snapshot.val();
                                console.log('Loaded core associates from Firebase Realtime Database');
                                setCoreAssociates(data.associates || {});
                                setLineLeadNotes(data.notes || {});
                                return;
                            }
                        } catch (error) {
                            console.error('Error loading core associates from Firebase:', error);
                        }
                    }

                    // Fallback to localStorage
                    const savedCoreAssociates = storage.load('coreAssociates', {});
                    setCoreAssociates(savedCoreAssociates);
                    const savedNotes = storage.load('lineLeadNotes', {});
                    setLineLeadNotes(savedNotes);
                };
                loadCoreAssociates();
            }, []);

            // Save core associates and notes to both localStorage and Firebase
            useEffect(() => {
                storage.save('coreAssociates', coreAssociates);
                storage.save('lineLeadNotes', lineLeadNotes);

                // Also save to Firebase
                if (isFirebaseConfigured && db && Object.keys(coreAssociates).length > 0) {
                    db.ref('settings/coreAssociates').set({
                        associates: coreAssociates,
                        notes: lineLeadNotes,
                        lastUpdated: new Date().toISOString()
                    }).then(() => {
                        console.log('Core associates saved to Firebase Realtime Database');
                    }).catch(error => {
                        console.error('Error saving core associates to Firebase:', error);
                    });
                }
            }, [coreAssociates, lineLeadNotes]);

            // Load associate status (suspensions / DNR / early leaves). The canonical
            // source is the raw `statusRaw` node (written daily by the SharePoint sync
            // or by a manual upload); it's resolved into a status list client-side so
            // the precedence + return-date logic lives in one place. localStorage
            // caches the resolved list for offline use.
            useEffect(() => {
                const applyRaw = (rawVal, metaVal) => {
                    const { statusList: resolved, meta } = resolveStatusRaw(rawVal);
                    const effectiveMeta = metaVal || meta;
                    setStatusList(resolved);
                    setStatusMeta(effectiveMeta);
                    storage.save('statusList', resolved);
                    storage.save('statusMeta', effectiveMeta);
                };
                const loadStatus = async () => {
                    if (isFirebaseConfigured && db) {
                        try {
                            const [rawSnap, metaSnap] = await Promise.all([
                                db.ref('statusRaw').once('value'),
                                db.ref('statusMeta').once('value')
                            ]);
                            const metaVal = metaSnap.exists() ? metaSnap.val() : null;
                            if (rawSnap.exists()) {
                                applyRaw(rawSnap.val(), metaVal);
                                console.log('Loaded status from Firebase (statusRaw)');
                                return;
                            }
                            // Legacy: a pre-resolved statusList from an older build.
                            const listSnap = await db.ref('statusList').once('value');
                            if (listSnap.exists()) {
                                setStatusList(listSnap.val() || {});
                                setStatusMeta(metaVal);
                                storage.save('statusList', listSnap.val() || {});
                                storage.save('statusMeta', metaVal);
                                return;
                            }
                        } catch (error) {
                            console.error('Error loading status from Firebase:', error);
                        }
                    }
                    setStatusList(storage.load('statusList', {}));
                    setStatusMeta(storage.load('statusMeta', null));
                };
                loadStatus();
                // Keep in sync if the daily sync (or another device) updates Firebase.
                if (isFirebaseConfigured && db) {
                    const rawRef = db.ref('statusRaw');
                    const rawHandler = rawRef.on('value', (snap) => {
                        if (snap.exists()) {
                            const { statusList: resolved } = resolveStatusRaw(snap.val());
                            setStatusList(resolved);
                            storage.save('statusList', resolved);
                        }
                    });
                    const metaRef = db.ref('statusMeta');
                    const metaHandler = metaRef.on('value', (snap) => {
                        const v = snap.exists() ? snap.val() : null;
                        setStatusMeta(v);
                        storage.save('statusMeta', v);
                    });
                    return () => { rawRef.off('value', rawHandler); metaRef.off('value', metaHandler); };
                }
            }, []);

            const statusNameIndex = React.useMemo(() => buildStatusNameIndex(statusList), [statusList]);

            // Load saved staffing reports once to build the "last lead worked for" index.
            useEffect(() => {
                const loadHistory = async () => {
                    const reportsList = [];
                    const seen = new Set();
                    if (isFirebaseConfigured && db) {
                        try {
                            const snap = await db.ref('staffing').once('value');
                            if (snap.exists()) {
                                const data = snap.val();
                                Object.keys(data).forEach(id => { reportsList.push(data[id]); seen.add(id); });
                            }
                        } catch (e) { console.error('Error loading staffing history:', e); }
                    }
                    Object.keys(localStorage)
                        .filter(k => k.startsWith('staffing_') && !k.includes('coreAssociates'))
                        .forEach(k => {
                            const d = storage.load(k);
                            if (!d || !d.date) return;
                            const id = `${d.date}_${d.shift}`;
                            if (!seen.has(id)) { reportsList.push(d); seen.add(id); }
                        });
                    setWorkHistoryIndex(buildWorkHistoryIndex(reportsList));
                };
                loadHistory();
            }, []);

            // Auto-save functionality
            useEffect(() => {
                if (lines.length === 0) return;
                if (isLoadingRef.current) return;

                if (saveTimeoutRef.current) {
                    clearTimeout(saveTimeoutRef.current);
                }

                // Capture current values in closure to prevent stale data
                const capturedDate = currentDate;
                const capturedShift = currentShift;
                const capturedLines = lines;
                const capturedWaitlist = waitlist;
                const capturedLocked = isLocked;

                saveTimeoutRef.current = setTimeout(() => {
                    handleAutoSave(capturedDate, capturedShift, capturedLines, capturedWaitlist, capturedLocked);
                }, 2000);

                return () => {
                    if (saveTimeoutRef.current) {
                        clearTimeout(saveTimeoutRef.current);
                    }
                };
            }, [lines, waitlist, currentDate, currentShift]);

            const handleAutoSave = async (date, shift, saveLines, saveWaitlist, locked) => {
                if (savingRef.current) return;
                savingRef.current = true;

                const staffingData = {
                    date: date,
                    shift: shift,
                    lines: saveLines,
                    waitlist: saveWaitlist,
                    locked: locked,
                    lastUpdated: new Date().toISOString()
                };

                // Save to Firebase first if configured
                if (isFirebaseConfigured && db) {
                    try {
                        const docId = `${date}_${shift}`;
                        await db.ref('staffing/' + docId).set(staffingData);
                        storage.save(`staffing_${date}_${shift}`, staffingData);

                        // Update lastLine / lastShift for each assigned associate
                        const nameToId = {};
                        Object.values(roster).forEach(a => { if (a.fullName) nameToId[a.fullName.toLowerCase().trim()] = a.employeeId; });
                        const rosterUpdates = {};
                        saveLines.forEach(line => {
                            if (line.isCut) return;
                            (line.positions || []).forEach(pos => {
                                const name = (pos.name || '').trim();
                                if (!name) return;
                                const empId = nameToId[name.toLowerCase()];
                                if (!empId) return;
                                rosterUpdates[`roster/associates/${empId}/lastLine`] = line.letter;
                                rosterUpdates[`roster/associates/${empId}/lastShift`] = shift;
                            });
                        });
                        if (Object.keys(rosterUpdates).length > 0) {
                            db.ref('/').update(rosterUpdates).then(() => {
                                const updated = { ...roster };
                                Object.entries(rosterUpdates).forEach(([path, val]) => {
                                    const parts = path.split('/'); // roster/associates/<id>/field
                                    const empId = parts[2], field = parts[3];
                                    if (updated[empId]) updated[empId] = { ...updated[empId], [field]: val };
                                });
                                setRoster(updated);
                                storage.save('roster', updated);
                            }).catch(e => console.error('Error updating lastLine/lastShift:', e));
                        }

                        setSaveStatus('Saved to cloud ✓');
                        setFirebaseStatus('connected');
                        setTimeout(() => setSaveStatus(''), 3000);
                    } catch (error) {
                        console.error('Firebase save error:', error);
                        setFirebaseStatus('disconnected');
                        // Still save locally as fallback
                        storage.save(`staffing_${date}_${shift}`, staffingData);
                        setSaveStatus('Error: Cloud save failed - saved locally only');
                        // Don't auto-clear errors
                    }
                } else {
                    storage.save(`staffing_${date}_${shift}`, staffingData);
                    setSaveStatus('Saved locally');
                    setTimeout(() => setSaveStatus(''), 3000);
                }

                savingRef.current = false;
            };

            const loadStaffingData = async (date, shift) => {
                console.log('Loading staffing data for:', date, shift);
                isLoadingRef.current = true;

                try {
                    // Try Firebase first
                    if (isFirebaseConfigured && db) {
                        try {
                            const docId = `${date}_${shift}`;
                            const snapshot = await db.ref('staffing/' + docId).once('value');
                            if (snapshot.exists()) {
                                const data = snapshot.val();
                                console.log('Loaded from Firebase Realtime Database:', docId, data);
                                isLoadingRef.current = false;
                                setLines(data.lines || []);
                                setWaitlist(data.waitlist || []);
                                setIsLocked(data.locked || false);
                                return;
                            } else {
                                console.log('Document not found in Firebase:', docId);
                            }
                        } catch (error) {
                            console.error('Firebase load error:', error);
                            alert('Error loading from Firebase: ' + error.message);
                        }
                    }

                    // Fallback to localStorage
                    const localData = storage.load(`staffing_${date}_${shift}`, null);
                    isLoadingRef.current = false;
                    if (localData) {
                        console.log('Loaded from localStorage:', localData);
                        setLines(localData.lines || []);
                        setWaitlist(localData.waitlist || []);
                        setIsLocked(localData.locked || false);
                    } else {
                        console.log('No data found');
                        setLines([]);
                        setWaitlist([]);
                        setIsLocked(false);
                    }
                } catch (error) {
                    console.error('Unexpected load error:', error);
                    isLoadingRef.current = false;
                }
            };

            const handleSaveSupervisorShift = (shift) => {
                setSupervisorShift(shift);
                storage.save('supervisorShift', shift);
            };

            const handleImportClick = () => {
                importInputRef.current?.click();
            };

            // Manual upload of the SharePoint tracking workbook. Writes the same
            // canonical `statusRaw` node the Power Automate sync writes, so a later
            // sync and a manual upload can't disagree about the source of truth.
            const handleStatusUpload = async (file) => {
                const { raw, meta } = await parseStatusWorkbook(file);
                if (isFirebaseConfigured && db) {
                    await db.ref('statusRaw').set(raw);
                    await db.ref('statusMeta').set(meta);
                }
                const { statusList: resolved } = resolveStatusRaw(raw);
                storage.save('statusList', resolved);
                storage.save('statusMeta', meta);
                setStatusList(resolved);
                setStatusMeta(meta);
                return meta;
            };

            const handleImportFile = async (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                e.target.value = '';

                try {
                    setImportStatus('Parsing...');
                    const { date, shift, lines, waitlist } = await parseStaffingXLSX(file);
                    const totalPeople = lines.reduce((sum, l) => sum + l.positions.length, 0);

                    const confirmed = confirm(
                        `Import: ${date} - ${shift} Shift\n` +
                        `${lines.length} line${lines.length !== 1 ? 's' : ''}, ${totalPeople} people assigned` +
                        (waitlist.length > 0 ? `, ${waitlist.length} on waitlist` : '') +
                        `\n\nSave this to your reports?`
                    );
                    if (!confirmed) { setImportStatus(''); return; }

                    const docId = `${date}_${shift}`;
                    let alreadyExists = false;
                    if (isFirebaseConfigured && db) {
                        const snap = await db.ref('staffing/' + docId).once('value');
                        alreadyExists = snap.exists();
                    }
                    if (!alreadyExists) {
                        alreadyExists = storage.load(`staffing_${date}_${shift}`, null) !== null;
                    }
                    if (alreadyExists) {
                        const overwrite = confirm(`A report for ${date} - ${shift} Shift already exists. Overwrite it?`);
                        if (!overwrite) { setImportStatus(''); return; }
                    }

                    const staffingData = {
                        date, shift, lines, waitlist,
                        locked: false,
                        lastUpdated: new Date().toISOString()
                    };

                    if (isFirebaseConfigured && db) {
                        await db.ref('staffing/' + docId).set(staffingData);
                    }
                    storage.save(`staffing_${date}_${shift}`, staffingData);

                    setImportStatus(`Imported ${date} - ${shift} ✓`);
                    setTimeout(() => setImportStatus(''), 4000);
                } catch (err) {
                    console.error('Import error:', err);
                    setImportStatus(`Error: ${err.message}`);
                    setTimeout(() => setImportStatus(''), 6000);
                }
            };

            const handleSetupShift = (shiftData) => {
                setCurrentDate(shiftData.date);
                setCurrentShift(shiftData.shift);

                // If loading existing sheet, just load the data
                if (shiftData.loadExisting) {
                    loadStaffingData(shiftData.date, shiftData.shift);
                    setActiveTab('staffing');
                    return;
                }

                const newLines = shiftData.lines.map(line => {
                    // Support both old (single lead) and new (multiple leads) format
                    const leads = line.leads || (line.lead ? [line.lead] : []);

                    // Combine core associates from all leads
                    const allCoreAssociates = [];
                    leads.forEach(lead => {
                        // Try exact match first, then case-insensitive match
                        let coreList = coreAssociates[lead];
                        if (!coreList) {
                            const matchKey = Object.keys(coreAssociates).find(
                                k => k.toLowerCase() === lead.toLowerCase()
                            );
                            coreList = matchKey ? coreAssociates[matchKey] : [];
                        }
                        allCoreAssociates.push(...coreList);
                    });

                    // Separate Crescent-tagged associates from regular ones
                    const regularAssociates = allCoreAssociates.filter(a => !(a.flags || []).includes('crescent'));
                    const crescentAssociates = allCoreAssociates.filter(a => (a.flags || []).includes('crescent'));
                    // Deduct crescent count from the requested number — crescent fill some of the needed slots
                    const needed = Math.max(0, parseInt(line.needed) - crescentAssociates.length);

                    return {
                        id: Date.now() + Math.random(),
                        letter: line.letter,
                        leads: leads,
                        needed: needed,
                        isCut: false,
                        positions: [
                            // Regular positions (up to `needed` count)
                            ...Array(needed).fill(null).map((_, idx) => {
                                if (idx < regularAssociates.length) {
                                    return {
                                        id: Date.now() + Math.random() + idx,
                                        name: regularAssociates[idx].name,
                                        isNew: false,
                                        isCrescent: false
                                    };
                                }
                                return {
                                    id: Date.now() + Math.random() + idx,
                                    name: '',
                                    isNew: false,
                                    isCrescent: false
                                };
                            }),
                            // Crescent positions appended at the bottom (not counted in fill/total)
                            ...crescentAssociates.map((assoc, idx) => ({
                                id: Date.now() + Math.random() + needed + idx,
                                name: assoc.name,
                                isNew: false,
                                isCrescent: true
                            }))
                        ]
                    };
                });

                setLines(newLines);
                setWaitlist([]);
                setActiveTab('staffing');
            };

            const handleUpdatePosition = (lineId, positionId, name, isNew) => {
                setLines(prev => prev.map(line => {
                    if (line.id === lineId) {
                        return {
                            ...line,
                            positions: line.positions.map(pos => {
                                if (pos.id === positionId) {
                                    // If this was a Crescent slot and the name is being cleared or changed,
                                    // demote it to a regular open slot so it can be filled normally.
                                    const isCrescent = pos.isCrescent && name.trim() === pos.name.trim() && name.trim() !== ''
                                        ? true
                                        : false;
                                    return { ...pos, name, isNew, isCrescent };
                                }
                                return pos;
                            })
                        };
                    }
                    return line;
                }));
            };

            const handleUpdateWaitlistItem = (itemId, name, isNew) => {
                setWaitlist(prev => prev.map(item =>
                    item.id === itemId ? { ...item, name: name, isNew } : item
                ));
            };

            const handleAddWaitlistItem = () => {
                setWaitlist(prev => [...prev, {
                    id: Date.now() + Math.random(),
                    name: '',
                    isNew: false
                }]);
            };

            const handleQuickAddWaitlist = (names) => {
                const newItems = names.map(name => ({
                    id: Date.now() + Math.random(),
                    name: name,
                    isNew: false
                }));
                setWaitlist(prev => [...prev, ...newItems]);
            };

            const handleRemoveWaitlistItem = (itemId) => {
                setWaitlist(prev => prev.filter(item => item.id !== itemId));
            };

            const handleAddLine = () => {
                const newLine = {
                    id: Date.now() + Math.random(),
                    letter: '',
                    leads: [],
                    needed: 5,
                    isCut: false,
                    positions: Array(5).fill(null).map((_, idx) => ({
                        id: Date.now() + Math.random() + idx,
                        name: '',
                        isNew: false
                    }))
                };
                setLines(prev => [...prev, newLine]);
            };

            const handleToggleCutLine = (lineId) => {
                const targetLine = lines.find(l => l.id === lineId);
                if (targetLine && !targetLine.isCut) {
                    pushUndo(`Line ${targetLine.letter || '?'} cut`);
                }
                setLines(prev => prev.map(line => {
                    if (line.id === lineId) {
                        const newCutStatus = !line.isCut;

                        // If marking as cut, move all assigned associates to waitlist
                        if (newCutStatus) {
                            const assignedAssociates = line.positions
                                .filter(p => p.name.trim())
                                .map(p => ({
                                    id: Date.now() + Math.random(),
                                    name: p.name,
                                    isNew: p.isNew
                                }));

                            if (assignedAssociates.length > 0) {
                                setWaitlist(prev => [...prev, ...assignedAssociates]);
                            }

                            // Clear all positions
                            return {
                                ...line,
                                isCut: true,
                                positions: line.positions.map(p => ({ ...p, name: '', isNew: false }))
                            };
                        }

                        return { ...line, isCut: newCutStatus };
                    }
                    return line;
                }));
            };

            const handleDragStart = (e, source) => {
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('application/json', JSON.stringify(source));

                // Create custom drag preview
                const dragPreview = document.createElement('div');
                dragPreview.className = 'drag-preview';

                // Get the name being dragged
                let dragName = '';
                if (source.type === 'waitlist') {
                    const item = waitlist.find(w => w.id === source.id);
                    dragName = item?.name || '';
                } else if (source.type === 'position') {
                    const line = lines.find(l => l.id === source.lineId);
                    const position = line?.positions.find(p => p.id === source.positionId);
                    dragName = position?.name || '';
                }

                dragPreview.innerHTML = `
                    <div style="min-width: 18px; font-size: 11px; font-weight: 600; color: #6b7280; text-align: center;">⋮⋮</div>
                    <div style="flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${dragName}</div>
                `;
                dragPreview.style.left = '-9999px';
                document.body.appendChild(dragPreview);
                e.dataTransfer.setDragImage(dragPreview, 0, 0);
                setTimeout(() => document.body.removeChild(dragPreview), 0);
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            };

            const handleDrop = (e, target) => {
                e.preventDefault();
                let source;
                try {
                    source = JSON.parse(e.dataTransfer.getData('application/json'));
                } catch (err) {
                    console.error('Invalid drag data:', err);
                    return;
                }

                // Don't allow drops on cut lines
                if (target.type === 'position') {
                    const targetLine = lines.find(l => l.id === target.lineId);
                    if (targetLine && targetLine.isCut) {
                        return;
                    }
                }

                // Handle different drop scenarios
                if (source.type === 'waitlist' && target.type === 'position') {
                    // Move from waitlist to position
                    const waitlistItem = waitlist.find(w => w.id === source.id);
                    const targetLine = lines.find(l => l.id === target.lineId);
                    const targetPosition = targetLine?.positions.find(p => p.id === target.positionId);

                    if (waitlistItem && targetPosition) {
                        // If target position is filled, move that person to waitlist first
                        if (targetPosition.name.trim()) {
                            setWaitlist(prev => [
                                ...prev.filter(w => w.id !== source.id),
                                {
                                    id: Date.now() + Math.random(),
                                    name: targetPosition.name,
                                    isNew: targetPosition.isNew
                                }
                            ]);
                        } else {
                            // Just remove from waitlist
                            handleRemoveWaitlistItem(source.id);
                        }
                        // Assign waitlist person to position
                        handleUpdatePosition(target.lineId, target.positionId, waitlistItem.name, waitlistItem.isNew);
                    }
                } else if (source.type === 'position' && target.type === 'waitlist') {
                    // Move from position to waitlist
                    const sourceLine = lines.find(l => l.id === source.lineId);
                    const sourcePosition = sourceLine?.positions.find(p => p.id === source.positionId);
                    if (sourcePosition && sourcePosition.name.trim()) {
                        setWaitlist(prev => [...prev, {
                            id: Date.now() + Math.random(),
                            name: sourcePosition.name,
                            isNew: sourcePosition.isNew
                        }]);
                        handleUpdatePosition(source.lineId, source.positionId, '', false);
                    }
                } else if (source.type === 'position' && target.type === 'position') {
                    // Swap positions - use a single state update to avoid race conditions
                    setLines(prev => prev.map(line => {
                        if (line.id === source.lineId || line.id === target.lineId) {
                            return {
                                ...line,
                                positions: line.positions.map(pos => {
                                    if (line.id === source.lineId && pos.id === source.positionId) {
                                        // Replace source with target's content
                                        const targetLine = prev.find(l => l.id === target.lineId);
                                        const targetPos = targetLine?.positions.find(p => p.id === target.positionId);
                                        // Clear isCrescent since the person occupying this slot is changing
                                        return targetPos ? { ...pos, name: targetPos.name, isNew: targetPos.isNew, isCrescent: false } : pos;
                                    } else if (line.id === target.lineId && pos.id === target.positionId) {
                                        // Replace target with source's content
                                        const sourceLine = prev.find(l => l.id === source.lineId);
                                        const sourcePos = sourceLine?.positions.find(p => p.id === source.positionId);
                                        // Clear isCrescent since the person occupying this slot is changing
                                        return sourcePos ? { ...pos, name: sourcePos.name, isNew: sourcePos.isNew, isCrescent: false } : pos;
                                    }
                                    return pos;
                                })
                            };
                        }
                        return line;
                    }));
                }
            };

            const pushUndo = (msg) => {
                setUndoStack(prev => [...prev.slice(-4), { lines: JSON.parse(JSON.stringify(lines)), waitlist: JSON.parse(JSON.stringify(waitlist)) }]);
                setUndoMessage(msg);
                if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
                undoTimerRef.current = setTimeout(() => setUndoMessage(''), 8000);
            };

            const handleUndo = () => {
                if (undoStack.length === 0) return;
                const last = undoStack[undoStack.length - 1];
                setLines(last.lines);
                setWaitlist(last.waitlist);
                setUndoStack(prev => prev.slice(0, -1));
                setUndoMessage('');
                if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
            };

            const handleRemoveLine = (lineId) => {
                const line = lines.find(l => l.id === lineId);
                const desc = line ? `Line ${line.letter || '?'}` : 'Line';
                if (confirm(`Remove ${desc}?`)) {
                    pushUndo(`${desc} removed`);
                    setLines(prev => prev.filter(l => l.id !== lineId));
                }
            };

            const handleUpdateLine = (lineId, updates) => {
                // Check for truncation before entering state updater
                if (updates.needed !== undefined && !updates.positions) {
                    const currentLine = lines.find(l => l.id === lineId);
                    if (currentLine) {
                        const newNeeded = parseInt(updates.needed) || 0;
                        // Only check non-Crescent positions for truncation
                        const regularPositions = currentLine.positions.filter(p => !p.isCrescent);
                        if (newNeeded < regularPositions.length) {
                            const wouldLose = regularPositions.slice(newNeeded).filter(p => p.name.trim());
                            if (wouldLose.length > 0) {
                                const names = wouldLose.map(p => p.name).join(', ');
                                if (!confirm(`Reducing positions will remove: ${names}\n\nContinue?`)) {
                                    return;
                                }
                            }
                        }
                    }
                }

                setLines(prev => prev.map(line => {
                    if (line.id === lineId) {
                        const updatedLine = { ...line, ...updates };

                        if (updates.positions) {
                            return updatedLine;
                        }

                        if (updates.needed !== undefined) {
                            const newNeeded = parseInt(updates.needed) || 0;
                            const regularPositions = line.positions.filter(p => !p.isCrescent);
                            const crescentPositions = line.positions.filter(p => p.isCrescent);

                            let newRegular;
                            if (newNeeded > regularPositions.length) {
                                const additionalPositions = Array(newNeeded - regularPositions.length)
                                    .fill(null)
                                    .map((_, idx) => ({
                                        id: Date.now() + Math.random() + idx,
                                        name: '',
                                        isNew: false,
                                        isCrescent: false
                                    }));
                                newRegular = [...regularPositions, ...additionalPositions];
                            } else {
                                newRegular = regularPositions.slice(0, newNeeded);
                            }
                            // Crescent positions are always preserved at the end
                            updatedLine.positions = [...newRegular, ...crescentPositions];
                        }

                        return updatedLine;
                    }
                    return line;
                }));
            };

            const handleAddCoreAssociate = (lead, associate) => {
                setCoreAssociates(prev => ({
                    ...prev,
                    [lead]: [...(prev[lead] || []), associate]
                }));
            };

            const handleRemoveCoreAssociate = (lead, index) => {
                setCoreAssociates(prev => ({
                    ...prev,
                    [lead]: prev[lead].filter((_, i) => i !== index)
                }));
            };

            const handleUpdateCoreAssociate = (lead, index, updates) => {
                setCoreAssociates(prev => ({
                    ...prev,
                    [lead]: prev[lead].map((assoc, i) => i === index ? { ...assoc, ...updates } : assoc)
                }));
            };

            const handleDeleteLineLead = (lead) => {
                if (confirm(`Delete line lead "${lead}" and all associated core team members? This cannot be undone.`)) {
                    setCoreAssociates(prev => {
                        const updated = { ...prev };
                        delete updated[lead];
                        return updated;
                    });
                    setLineLeadNotes(prev => {
                        const updated = { ...prev };
                        delete updated[lead];
                        return updated;
                    });
                }
            };

            const handleRenameLineLead = (oldName, newName) => {
                if (!newName.trim() || newName === oldName) return;
                if (coreAssociates[newName]) {
                    alert(`A line lead named "${newName}" already exists.`);
                    return;
                }
                setCoreAssociates(prev => {
                    const updated = {};
                    Object.keys(prev).forEach(key => {
                        if (key === oldName) {
                            updated[newName] = prev[key];
                        } else {
                            updated[key] = prev[key];
                        }
                    });
                    return updated;
                });
                setLineLeadNotes(prev => {
                    const updated = {};
                    Object.keys(prev).forEach(key => {
                        if (key === oldName) {
                            updated[newName] = prev[key];
                        } else {
                            updated[key] = prev[key];
                        }
                    });
                    return updated;
                });
            };

            const handleUpdateLineLeadNotes = (lead, notes) => {
                setLineLeadNotes(prev => ({ ...prev, [lead]: notes }));
            };

            const handleExport = () => {
                // Match the staffing screen's name-display preference (Last, First).
                const lastFirst = storage.load('nameDisplayLastFirst', false);
                const fmtName = (n) => lastFirst ? formatLastFirst(n) : n;

                // Create workbook
                const wb = XLSX.utils.book_new();

                // Calculate stats (excluding Crescent positions)
                const activeLines = lines.filter(line => !line.isCut);
                const cutLines = lines.filter(line => line.isCut);
                const totalPositions = activeLines.reduce((sum, line) => sum + line.needed, 0);
                const filledPositions = activeLines.reduce((sum, line) =>
                    sum + line.positions.filter(p => p.name.trim() && !p.isCrescent).length, 0
                );
                const newAssociates = activeLines.reduce((sum, line) =>
                    sum + line.positions.filter(p => p.name.trim() && p.isNew && !p.isCrescent).length, 0
                );

                // Build data in column-based layout (like the tool)
                const data = [];

                // Title row
                data.push(['Crescent Staffing Planner']);

                // Info row
                data.push([`${currentDate} - ${currentShift} Shift`, '', '', '', `Exported: ${new Date().toLocaleString()}`]);

                // Stats row
                data.push([`${filledPositions} / ${totalPositions} filled`, `${newAssociates} new`, cutLines.length > 0 ? `${cutLines.length} cut` : '', waitlist.filter(w => w.name.trim()).length > 0 ? `${waitlist.filter(w => w.name.trim()).length} waiting` : '']);

                // Empty row
                data.push([]);

                // Find max positions needed for any line (excluding Crescent positions)
                const maxPositions = Math.max(
                    ...lines.map(l => l.positions.filter(p => !p.isCrescent).length),
                    waitlist.length
                );

                // Header row - Line letters and waitlist
                const headerRow = [];
                lines.forEach(line => {
                    headerRow.push(`Line ${line.letter}${line.isCut ? ' (CUT)' : ''}`);
                    headerRow.push(''); // Spacing column
                });
                headerRow.push('WAITLIST');
                data.push(headerRow);

                // Subheader row - Line leads
                const subheaderRow = [];
                lines.forEach(line => {
                    const leads = (line.leads || []).join(', ');
                    subheaderRow.push(leads || 'No lead');
                    subheaderRow.push(''); // Spacing column
                });
                subheaderRow.push('');
                data.push(subheaderRow);

                // Position rows (Crescent positions are excluded from export)
                for (let i = 0; i < maxPositions; i++) {
                    const row = [];
                    lines.forEach(line => {
                        const nonCrescentPositions = line.positions.filter(p => !p.isCrescent);
                        const position = nonCrescentPositions[i];
                        if (position) {
                            const name = fmtName(position.name || '');
                            const marker = position.isNew ? ' ⭐' : '';
                            row.push(name + marker);
                        } else {
                            row.push('');
                        }
                        row.push(''); // Spacing column
                    });

                    // Add waitlist item
                    const waitlistItem = waitlist[i];
                    if (waitlistItem) {
                        const marker = waitlistItem.isNew ? ' ⭐' : '';
                        row.push(fmtName(waitlistItem.name || '') + marker);
                    } else {
                        row.push('');
                    }

                    data.push(row);
                }

                // Create worksheet
                const ws = XLSX.utils.aoa_to_sheet(data);

                // Set column widths
                const colWidths = [];
                lines.forEach(() => {
                    colWidths.push({ wch: 20 }); // Line column
                    colWidths.push({ wch: 2 });  // Spacing column
                });
                colWidths.push({ wch: 20 }); // Waitlist column
                ws['!cols'] = colWidths;

                // Apply styling
                const range = XLSX.utils.decode_range(ws['!ref']);

                // Style title (row 0)
                for (let C = range.s.c; C <= range.e.c; C++) {
                    const cellAddress = XLSX.utils.encode_cell({ r: 0, c: C });
                    if (!ws[cellAddress]) continue;
                    ws[cellAddress].s = {
                        font: { bold: true, sz: 16, color: { rgb: "FFFFFF" } },
                        fill: { fgColor: { rgb: "667EEA" } },
                        alignment: { horizontal: "center", vertical: "center" }
                    };
                }

                // Style info row (row 1)
                for (let C = range.s.c; C <= range.e.c; C++) {
                    const cellAddress = XLSX.utils.encode_cell({ r: 1, c: C });
                    if (!ws[cellAddress]) continue;
                    ws[cellAddress].s = {
                        font: { bold: true, sz: 11 },
                        fill: { fgColor: { rgb: "F3F4F6" } },
                        alignment: { horizontal: "center" }
                    };
                }

                // Style stats row (row 2)
                for (let C = range.s.c; C <= range.e.c; C++) {
                    const cellAddress = XLSX.utils.encode_cell({ r: 2, c: C });
                    if (!ws[cellAddress]) continue;
                    ws[cellAddress].s = {
                        font: { sz: 10 },
                        fill: { fgColor: { rgb: "E5E7EB" } },
                        alignment: { horizontal: "center" }
                    };
                }

                // Style line headers (row 4)
                let colIndex = 0;
                lines.forEach((line, idx) => {
                    const cellAddress = XLSX.utils.encode_cell({ r: 4, c: colIndex });
                    if (ws[cellAddress]) {
                        ws[cellAddress].s = {
                            font: { bold: true, sz: 12, color: { rgb: "FFFFFF" } },
                            fill: { fgColor: { rgb: line.isCut ? "EF4444" : "667EEA" } },
                            alignment: { horizontal: "center", vertical: "center" }
                        };
                    }
                    colIndex += 2; // Skip spacing column
                });

                // Style waitlist header
                const waitlistHeaderCell = XLSX.utils.encode_cell({ r: 4, c: colIndex });
                if (ws[waitlistHeaderCell]) {
                    ws[waitlistHeaderCell].s = {
                        font: { bold: true, sz: 12, color: { rgb: "FFFFFF" } },
                        fill: { fgColor: { rgb: "F59E0B" } },
                        alignment: { horizontal: "center", vertical: "center" }
                    };
                }

                // Style lead names (row 5)
                colIndex = 0;
                lines.forEach(() => {
                    const cellAddress = XLSX.utils.encode_cell({ r: 5, c: colIndex });
                    if (ws[cellAddress]) {
                        ws[cellAddress].s = {
                            font: { italic: true, sz: 10 },
                            fill: { fgColor: { rgb: "F9FAFB" } },
                            alignment: { horizontal: "center" }
                        };
                    }
                    colIndex += 2;
                });

                // Style position cells (starting from row 6)
                for (let R = 6; R <= range.e.r; R++) {
                    colIndex = 0;
                    lines.forEach((line) => {
                        const cellAddress = XLSX.utils.encode_cell({ r: R, c: colIndex });
                        if (ws[cellAddress]) {
                            const cellValue = ws[cellAddress].v || '';
                            const isNew = cellValue.includes('⭐');
                            const isEmpty = !cellValue.trim() || cellValue.trim() === '⭐';

                            ws[cellAddress].s = {
                                fill: {
                                    fgColor: {
                                        rgb: isEmpty ? "FFFFFF" :
                                             isNew ? "DBEAFE" :
                                             line.isCut ? "FEE2E2" :
                                             "F0FDF4"
                                    }
                                },
                                border: {
                                    top: { style: "thin", color: { rgb: "E5E7EB" } },
                                    bottom: { style: "thin", color: { rgb: "E5E7EB" } },
                                    left: { style: "thin", color: { rgb: "E5E7EB" } },
                                    right: { style: "thin", color: { rgb: "E5E7EB" } }
                                },
                                alignment: { vertical: "center" }
                            };
                        }
                        colIndex += 2;
                    });

                    // Style waitlist cells
                    const waitlistCell = XLSX.utils.encode_cell({ r: R, c: colIndex });
                    if (ws[waitlistCell]) {
                        const cellValue = ws[waitlistCell].v || '';
                        const isNew = cellValue.includes('⭐');
                        const isEmpty = !cellValue.trim() || cellValue.trim() === '⭐';

                        ws[waitlistCell].s = {
                            fill: {
                                fgColor: {
                                    rgb: isEmpty ? "FFFFFF" :
                                         isNew ? "DBEAFE" :
                                         "FEF3C7"
                                }
                            },
                            border: {
                                top: { style: "thin", color: { rgb: "E5E7EB" } },
                                bottom: { style: "thin", color: { rgb: "E5E7EB" } },
                                left: { style: "thin", color: { rgb: "E5E7EB" } },
                                right: { style: "thin", color: { rgb: "E5E7EB" } }
                            },
                            alignment: { vertical: "center" }
                        };
                    }
                }

                XLSX.utils.book_append_sheet(wb, ws, 'Staffing');

                // Export file
                XLSX.writeFile(wb, `staffing-${currentDate}-${currentShift}.xlsx`);
            };

            const handleClearAll = () => {
                if (confirm('Clear current shift data?')) {
                    pushUndo('Shift data cleared');
                    setLines([]);
                    setWaitlist([]);
                }
            };

            const handleToggleLock = () => {
                if (!isLocked) {
                    // Locking
                    if (confirm('Lock this staffing sheet? Once locked, no edits can be made until it is unlocked.')) {
                        setIsLocked(true);
                    }
                } else {
                    // Unlocking
                    if (confirm('Unlock this staffing sheet? This will allow edits to be made.')) {
                        setIsLocked(false);
                    }
                }
            };

            return (
                <div className="container">
                    {showShiftModal && (
                        <div className="quick-add-modal">
                            <div className="quick-add-content" style={{ maxWidth: '380px' }}>
                                <div className="quick-add-header">
                                    <span className="quick-add-title">Welcome — What shift do you manage?</span>
                                </div>
                                <p style={{ fontSize: '13px', color: '#6b7280', marginBottom: '16px' }}>
                                    This helps warn you if you accidentally create a sheet for the wrong shift.
                                </p>
                                <div style={{ display: 'flex', gap: '10px', marginBottom: '20px' }}>
                                    {['1st', '2nd', 'Swing'].map(s => (
                                        <button
                                            key={s}
                                            type="button"
                                            onClick={() => setShiftModalDraft(s)}
                                            style={{
                                                flex: 1,
                                                padding: '12px 0',
                                                borderRadius: '8px',
                                                border: shiftModalDraft === s ? '2px solid #2563eb' : '2px solid #d1d5db',
                                                background: shiftModalDraft === s ? '#eff6ff' : 'white',
                                                color: shiftModalDraft === s ? '#2563eb' : '#374151',
                                                fontWeight: shiftModalDraft === s ? '700' : '500',
                                                fontSize: '14px',
                                                cursor: 'pointer'
                                            }}
                                        >
                                            {s}
                                        </button>
                                    ))}
                                </div>
                                <button
                                    type="button"
                                    className="btn btn-primary"
                                    style={{ width: '100%' }}
                                    onClick={() => {
                                        handleSaveSupervisorShift(shiftModalDraft);
                                        setShowShiftModal(false);
                                    }}
                                >
                                    Save My Shift
                                </button>
                            </div>
                        </div>
                    )}
                    <div className="header">
                        <h1>Crescent Staffing Planner</h1>
                        <div className="header-actions">
                            {importStatus && (
                                <span style={{ fontSize: '12px', color: importStatus.startsWith('Error') ? '#ef4444' : '#10b981' }}>
                                    {importStatus}
                                </span>
                            )}
                            <button
                                className="btn btn-secondary"
                                onClick={handleImportClick}
                                title="Upload a previously exported .xlsx staffing sheet"
                            >
