        function BadgeScanModal({ roster, statusList, lines, waitlist, currentDate, onAddToWaitlist, onClose }) {
            const [scanInput, setScanInput] = useState('');
            const [scanResult, setScanResult] = useState(null);
            const [isSearching, setIsSearching] = useState(false);
            const [newHireName, setNewHireName] = useState('');
            const [newHireStatus, setNewHireStatus] = useState('new'); // 'new' | 'returning'
            const inputRef = useRef(null);

            useEffect(() => {
                setTimeout(() => inputRef.current && inputRef.current.focus(), 100);
            }, []);

            const parseBadge = (code) => {
                const match = code.trim().toUpperCase().match(/^PLX-(\w+)-([A-Z]{1,3})$/);
                if (!match) return null;
                return { employeeId: match[1], lastNamePrefix: match[2] };
            };

            const findLastLine = async (fullName) => {
                const today = new Date(currentDate);
                for (let i = 1; i <= 4; i++) {
                    const d = new Date(today);
                    d.setDate(today.getDate() - i);
                    const dateStr = d.toISOString().split('T')[0];
                    for (const shift of ['1st', '2nd', 'Swing']) {
                        try {
                            if (isFirebaseConfigured && db) {
                                const snap = await db.ref(`staffing/${dateStr}_${shift}`).once('value');
                                if (snap.exists()) {
                                    const data = snap.val();
                                    for (const line of (data.lines || [])) {
                                        for (const pos of (line.positions || [])) {
                                            if (pos.name && pos.name.trim().toLowerCase() === fullName.toLowerCase()) {
                                                return { date: dateStr, shift, line: line.letter, daysAgo: i };
                                            }
                                        }
                                    }
                                }
                            }
                        } catch (e) {}
                    }
                }
                return null;
            };

            const findDuplicate = (fullName) => {
                const lc = fullName.toLowerCase();
                for (const line of (lines || [])) {
                    if (line.isCut) continue;
                    for (const pos of (line.positions || [])) {
                        if (pos.name && pos.name.trim().toLowerCase() === lc) return `Line ${line.letter}`;
                    }
                }
                for (const w of (waitlist || [])) {
                    if (w.name && w.name.trim().toLowerCase() === lc) return 'Waitlist';
                }
                return null;
            };

            const handleScan = async (code) => {
                if (!code.trim()) return;
                setIsSearching(true);
                setScanResult(null);
                setNewHireName('');
                setNewHireStatus('new');
                const rosterList = Object.values(roster || {});

                const parsed = parseBadge(code);
                const rawId = parsed ? parsed.employeeId : code.trim().toUpperCase();
                const lastNamePrefix = parsed ? parsed.lastNamePrefix : undefined;
                const match = rosterList.find(r => String(r.employeeId).toUpperCase() === String(rawId).toUpperCase());

                // Disciplinary status (suspension / DNR / termination) from the Badge
                // Check data, matched on the numeric EID.
                const eid = normalizeEid(rawId) || (match ? normalizeEid(match.employeeId) : '');
                const statusEntry = eid ? (statusList || {})[eid] : null;
                const discipline = statusEntry ? resolveEntryStatus(statusEntry) : null;

                if (!match) {
                    setScanResult({ type: 'new_hire', employeeId: rawId, lastNamePrefix, discipline });
                } else if (!match.isActive) {
                    setScanResult({ type: 'inactive', employee: match, alreadyStaffed: findDuplicate(match.fullName), discipline });
                } else {
                    setScanResult({ type: 'found', employee: match, alreadyStaffed: findDuplicate(match.fullName), discipline });
                }
                setIsSearching(false);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    handleScan(scanInput);
                    setScanInput('');
                } else if (e.key === 'Escape') {
                    onClose();
                }
            };

            const handleAdd = (name, isNew) => {
                onAddToWaitlist(name, isNew);
                setScanResult(null);
                setScanInput('');
                setTimeout(() => inputRef.current && inputRef.current.focus(), 50);
            };

            return (
                <div className="quick-add-modal" onClick={onClose}>
                    <div className="quick-add-content" style={{ maxWidth: '460px' }} onClick={(e) => e.stopPropagation()}>
                        <div className="quick-add-header">
                            <span className="quick-add-title">Badge Scanner</span>
                            <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: '20px', lineHeight: 1, cursor: 'pointer', color: '#6b7280', padding: '0 4px' }} title="Close">✕</button>
                        </div>
                        <p style={{ fontSize: '12px', color: '#6b7280', marginBottom: '12px' }}>
                            Scan a badge or enter an employee ID and press Enter.<br/>
                            Badge format: <strong style={{ fontFamily: 'monospace' }}>PLX-[ID]-[3 letters]</strong> &nbsp;·&nbsp; Or just type an employee ID
                        </p>
                        <input
                            ref={inputRef}
                            type="text"
                            className="quick-add-input"
                            value={scanInput}
                            onChange={(e) => setScanInput(e.target.value)}
                            onKeyDown={handleKeyDown}
                            placeholder="Scan badge (PLX-12345-SMI) or enter employee ID..."
                            style={{ letterSpacing: '0.5px', fontFamily: 'monospace', fontSize: '14px' }}
                        />
                        {isSearching && (
                            <div style={{ textAlign: 'center', padding: '12px', color: '#6b7280', fontSize: '13px' }}>Looking up...</div>
                        )}
                        {scanResult && !isSearching && (
                            <div>
                                {scanResult.discipline && (
                                    <div
                                        className={`scan-result-box ${scanResult.discipline.kind === 'suspended' ? 'scan-result-invalid' : 'scan-result-inactive'}`}
                                        style={{ marginBottom: '8px', fontWeight: '700' }}
                                    >
                                        ⛔ {scanResult.discipline.label}
                                        <div style={{ fontSize: '11px', fontWeight: '600' }}>
                                            {scanResult.discipline.kind === 'suspended' ? 'Do not staff until the return date.' : 'Do not staff — flagged in Badge Check.'}
                                        </div>
                                    </div>
                                )}
                                {scanResult.type === 'found' && (
                                    <div className="scan-result-box scan-result-found">
                                        <div style={{ fontWeight: '700', marginBottom: '2px' }}>✓ {scanResult.employee.fullName}</div>
                                        <div style={{ fontSize: '11px', opacity: 0.8 }}>ID: {scanResult.employee.employeeId} · Active{scanResult.employee.assignedShift ? ` · ${scanResult.employee.assignedShift} shift` : ''}</div>
                                        {scanResult.employee.lastLine ? (
                                            <div>
                                                <span className="last-line-badge">
                                                    Last on Line {scanResult.employee.lastLine}{scanResult.employee.lastShift ? ` (${scanResult.employee.lastShift})` : ''}
                                                </span>
                                            </div>
                                        ) : (
                                            <div style={{ marginTop: '4px', fontSize: '11px', opacity: 0.7 }}>No line history recorded yet</div>
                                        )}
                                        {scanResult.alreadyStaffed ? (
                                            <div style={{ marginTop: '8px', padding: '6px 10px', background: '#fef3c7', border: '1px solid #fcd34d', borderRadius: '4px', fontSize: '12px', color: '#92400e', fontWeight: '600' }}>
                                                ⚠ Already staffed on {scanResult.alreadyStaffed}
                                            </div>
                                        ) : (
                                            <button className="btn btn-success" style={{ marginTop: '10px', width: '100%' }} onClick={() => handleAdd(scanResult.employee.fullName, false)}>
                                                Add to Waitlist
                                            </button>
                                        )}
                                    </div>
                                )}
                                {scanResult.type === 'inactive' && (
                                    <div className="scan-result-box scan-result-inactive">
                                        <div style={{ fontWeight: '700', marginBottom: '2px' }}>⚠ {scanResult.employee.fullName}</div>
                                        <div style={{ fontSize: '11px' }}>ID: {scanResult.employee.employeeId} · <strong>INACTIVE</strong> — not on active roster</div>
                                        {scanResult.alreadyStaffed && (
                                            <div style={{ marginTop: '6px', fontSize: '12px', fontWeight: '600' }}>
                                                ⚠ Already staffed on {scanResult.alreadyStaffed}
                                            </div>
                                        )}
                                        <button className="btn btn-danger" style={{ marginTop: '10px', width: '100%' }} onClick={() => handleAdd(scanResult.employee.fullName, false)}>
                                            Add Anyway (Inactive)
                                        </button>
                                    </div>
                                )}
                                {scanResult.type === 'new_hire' && (
                                    <div className="scan-result-box scan-result-new-hire">
                                        <div style={{ fontWeight: '700', marginBottom: '4px' }}>★ Not in Roster{scanResult.employeeId ? ` — ID: ${scanResult.employeeId}` : ''}</div>
                                        <div style={{ marginBottom: '8px' }}>
                                            <input
                                                type="text"
                                                value={newHireName}
                                                onChange={(e) => setNewHireName(e.target.value)}
                                                placeholder="Enter full name..."
                                                style={{ width: '100%', boxSizing: 'border-box', padding: '6px 8px', border: '1px solid #93c5fd', borderRadius: '4px', fontSize: '13px' }}
                                                autoFocus
                                            />
                                        </div>
                                        <div style={{ display: 'flex', gap: '8px', marginBottom: '10px' }}>
                                            <button
                                                className={`btn btn-small ${newHireStatus === 'new' ? 'btn-primary' : 'btn-secondary'}`}
                                                style={{ flex: 1 }}
                                                onClick={() => setNewHireStatus('new')}
                                            >
                                                New Associate
                                            </button>
                                            <button
                                                className={`btn btn-small ${newHireStatus === 'returning' ? 'btn-primary' : 'btn-secondary'}`}
                                                style={{ flex: 1 }}
                                                onClick={() => setNewHireStatus('returning')}
                                            >
                                                Returning
                                            </button>
                                        </div>
                                        <button
                                            className="btn btn-primary"
                                            style={{ width: '100%' }}
                                            disabled={!newHireName.trim()}
                                            onClick={() => handleAdd(newHireName.trim(), newHireStatus === 'new')}
                                        >
                                            Add to Waitlist
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}
                        <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: '16px' }}>
                            <button className="btn btn-secondary" onClick={onClose}>Close</button>
                        </div>
                    </div>
                </div>
            );
        }

        function StaffingView({
            lines,
            waitlist,
            currentDate,
            currentShift,
            saveStatus,
            setSaveStatus,
            isLocked,
            coreAssociates,
            undoMessage,
            onUndo,
            onToggleLock,
            onUpdatePosition,
            onUpdateWaitlistItem,
            onAddWaitlistItem,
            onQuickAddWaitlist,
            onRemoveWaitlistItem,
            onAddLine,
            onRemoveLine,
            onUpdateLine,
            onToggleCutLine,
            onDragStart,
            onDragOver,
            onDrop,
            setLines,
            setWaitlist,
            statusNameIndex,
            workHistoryIndex,
            statusList,
            roster
        }) {
            const [isQuickAddOpen, setIsQuickAddOpen] = useState(false);
            const [quickAddInput, setQuickAddInput] = useState('');
            const [quickAddNames, setQuickAddNames] = useState([]); // [{name, lastLine, lastShift}]
            const [waitlistSearch, setWaitlistSearch] = useState('');
            const [selectMode, setSelectMode] = useState(false);
            const [selectedPositions, setSelectedPositions] = useState([]);
            const [selectedWaitlist, setSelectedWaitlist] = useState([]);
            const [lastFirst, setLastFirst] = useState(() => storage.load('nameDisplayLastFirst', false));
            const [showBadgeScan, setShowBadgeScan] = useState(false);
            const quickAddInputRef = useRef(null);

            const toggleLastFirst = () => setLastFirst(v => {
                const nv = !v;
                storage.save('nameDisplayLastFirst', nv);
                return nv;
            });

            // Sort each line's names alphabetically by last name. Keeps blanks at the
            // bottom and keeps Crescent positions grouped (sorted within their group).
            const handleAlphabetize = () => {
                const sortFn = (a, b) => {
                    const an = (a.name || '').trim(), bn = (b.name || '').trim();
                    if (!an && !bn) return 0;
                    if (!an) return 1;
                    if (!bn) return -1;
                    return lastNameKey(an).localeCompare(lastNameKey(bn)) || an.localeCompare(bn);
                };
                setLines(prev => prev.map(line => {
                    const regular = line.positions.filter(p => !p.isCrescent).sort(sortFn);
                    const crescent = line.positions.filter(p => p.isCrescent).sort(sortFn);
                    return { ...line, positions: [...regular, ...crescent] };
                }));
            };

            const handleQuickAddName = (nameOrAssoc) => {
                const name = typeof nameOrAssoc === 'string' ? nameOrAssoc : nameOrAssoc.fullName;
                const lastLine  = typeof nameOrAssoc === 'object' ? nameOrAssoc.lastLine  || null : null;
                const lastShift = typeof nameOrAssoc === 'object' ? nameOrAssoc.lastShift || null : null;
                setQuickAddNames(prev => [...prev, { name, lastLine, lastShift }]);
                setQuickAddInput('');
            };

            const handleRemoveQuickAddName = (index) => {
                setQuickAddNames(quickAddNames.filter((_, i) => i !== index));
            };

            const handleConfirmQuickAdd = () => {
                if (quickAddNames.length > 0) {
                    onQuickAddWaitlist(quickAddNames.map(n => n.name));
                }
                setIsQuickAddOpen(false);
                setQuickAddInput('');
                setQuickAddNames([]);
            };

            const handleCancelQuickAdd = () => {
                if (quickAddNames.length > 0) {
                    if (!confirm(`Discard ${quickAddNames.length} name(s)?`)) return;
                }
                setIsQuickAddOpen(false);
                setQuickAddInput('');
                setQuickAddNames([]);
            };

            if (lines.length === 0) {
                return (
                    <div className="empty-state">
                        <h3>No Shift Configured</h3>
                        <p>Go to "Setup" to create today's staffing chart.</p>
                    </div>
                );
            }

            // Calculate stats excluding cut lines and Crescent positions
            const activeLines = lines.filter(line => !line.isCut);
            const cutLines = lines.filter(line => line.isCut);
            const totalPositions = activeLines.reduce((sum, line) => sum + line.needed, 0);
            const filledPositions = activeLines.reduce((sum, line) =>
                sum + line.positions.filter(p => p.name.trim() && !p.isCrescent).length, 0
            );
            const newAssociates = activeLines.reduce((sum, line) =>
                sum + line.positions.filter(p => p.name.trim() && p.isNew && !p.isCrescent).length, 0
            );

            // Duplicate person detection (bug #5)
            const allNames = [];
            lines.forEach(line => {
                if (!line.isCut) {
                    line.positions.forEach(p => {
                        if (p.name.trim()) allNames.push({ name: p.name.trim().toLowerCase(), location: `Line ${line.letter}` });
                    });
                }
            });
            waitlist.forEach(w => {
                if (w.name.trim()) allNames.push({ name: w.name.trim().toLowerCase(), location: 'Waitlist' });
            });
            const nameCounts = {};
            allNames.forEach(({ name, location }) => {
                if (!nameCounts[name]) nameCounts[name] = [];
                nameCounts[name].push(location);
            });
            const duplicates = Object.entries(nameCounts).filter(([_, locs]) => locs.length > 1);

            // Bulk operation handlers
            const togglePositionSelect = (lineId, positionId) => {
                setSelectedPositions(prev => {
                    const exists = prev.find(s => s.lineId === lineId && s.positionId === positionId);
                    if (exists) return prev.filter(s => !(s.lineId === lineId && s.positionId === positionId));
                    return [...prev, { lineId, positionId }];
                });
            };

            const toggleWaitlistSelect = (id) => {
                setSelectedWaitlist(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
            };

            const handleBulkMoveToWaitlist = () => {
                const toMove = [];
                selectedPositions.forEach(({ lineId, positionId }) => {
                    const line = lines.find(l => l.id === lineId);
                    if (line) {
                        const pos = line.positions.find(p => p.id === positionId);
                        if (pos && pos.name.trim()) {
                            toMove.push({ name: pos.name, isNew: pos.isNew });
                        }
                    }
                });
                if (toMove.length > 0) {
                    const newWaitlistItems = toMove.map(item => ({ id: Date.now() + Math.random(), name: item.name, isNew: item.isNew }));
                    setWaitlist(prev => [...prev, ...newWaitlistItems]);
                    setLines(prev => prev.map(line => ({
                        ...line,
                        positions: line.positions.map(pos => {
                            if (selectedPositions.find(s => s.lineId === line.id && s.positionId === pos.id)) {
                                return { ...pos, name: '', isNew: false };
                            }
                            return pos;
                        })
                    })));
                }
                setSelectedPositions([]);
                setSelectedWaitlist([]);
            };

            const handleBulkClear = () => {
                setLines(prev => prev.map(line => ({
                    ...line,
                    positions: line.positions.map(pos => {
                        if (selectedPositions.find(s => s.lineId === line.id && s.positionId === pos.id)) {
                            return { ...pos, name: '', isNew: false };
                        }
                        return pos;
                    })
                })));
                setWaitlist(prev => prev.map(item => {
                    if (selectedWaitlist.includes(item.id)) {
                        return { ...item, name: '', isNew: false };
                    }
                    return item;
                }));
                setSelectedPositions([]);
                setSelectedWaitlist([]);
            };

            const handleDeselectAll = () => {
                setSelectedPositions([]);
                setSelectedWaitlist([]);
            };

            const filteredWaitlist = waitlistSearch.trim()
                ? waitlist.filter(w => w.name.toLowerCase().includes(waitlistSearch.toLowerCase()))
                : waitlist;

            return (
                <>
                    <div className="print-header">Crescent Staffing Planner - {currentDate} - {currentShift} Shift</div>

                    {!isFirebaseConfigured && (
                        <div className="firebase-config">
                            <h4>⚠️ Firebase Not Configured</h4>
                            <p>Data is being saved locally only. To enable cloud sync and remote access, please configure Firebase in the code.</p>
                        </div>
                    )}

                    {isLocked && (
                        <div className="lock-banner">
                            <span>This staffing sheet is locked. Unlock to make changes.</span>
                            <button className="btn btn-primary btn-small" onClick={onToggleLock}>Unlock</button>
                        </div>
                    )}

                    {duplicates.length > 0 && (
                        <div className="duplicate-warning">
                            <strong>Duplicate names detected:</strong>{' '}
                            {duplicates.map(([name, locs]) => `${name} (${locs.join(', ')})`).join('; ')}
                        </div>
                    )}

                    <div className="stats-bar">
                        <div>
                            <strong>{currentDate}</strong> - {currentShift} Shift
                            {isLocked && (
                                <span style={{ marginLeft: '12px', padding: '4px 8px', background: '#fee2e2', color: '#991b1b', borderRadius: '4px', fontSize: '11px', fontWeight: '600' }}>
                                    🔒 LOCKED
                                </span>
                            )}
                        </div>
                        <div>
                            <strong style={{ color: '#10b981', fontSize: '14px' }}>{filledPositions}</strong> / {totalPositions} filled
                            {newAssociates > 0 && <span style={{ marginLeft: '12px', color: '#3b82f6' }}>• {newAssociates} new</span>}
                            {cutLines.length > 0 && <span style={{ marginLeft: '12px', color: '#ef4444' }}>• {cutLines.length} cut</span>}
                            {waitlist.filter(w => w.name.trim()).length > 0 && <span style={{ marginLeft: '12px', color: '#f59e0b' }}>• {waitlist.filter(w => w.name.trim()).length} waiting</span>}
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                            <button
                                className="btn btn-secondary"
                                onClick={() => setShowBadgeScan(true)}
                                style={{ fontSize: '12px', padding: '6px 12px' }}
                                title="Scan associate badge (PLX-ID-XXX)"
                            >
                                Scan Badge
                            </button>
                            <button
                                className={`btn ${lastFirst ? 'btn-primary' : 'btn-secondary'}`}
                                onClick={toggleLastFirst}
                                title="Toggle name display between First Last and Last, First"
                                style={{ fontSize: '12px', padding: '6px 12px' }}
                            >

        function AutocompleteInput({ value, onChange, onSelect, onEnter, roster, placeholder, disabled, className, lastFirst }) {
            const [suggestions, setSuggestions] = useState([]);
            const [highlightedIdx, setHighlightedIdx] = useState(-1);
            const [open, setOpen] = useState(false);
            const [focused, setFocused] = useState(false);

            const buildSuggestions = (query) => {
                if (!query || query.length < 2 || !roster || Object.keys(roster).length === 0) return [];
                const lq = query.toLowerCase();
                return Object.values(roster)
                    .filter(r => r.isActive && r.fullName.toLowerCase().includes(lq))
                    .sort((a, b) => {
                        const als = a.fullName.toLowerCase().startsWith(lq);
                        const bls = b.fullName.toLowerCase().startsWith(lq);
                        if (als !== bls) return als ? -1 : 1;
                        return a.fullName.localeCompare(b.fullName);
                    })
                    .slice(0, 8);
            };

            const selectSuggestion = (assoc) => {
                onChange(assoc.fullName);
                setSuggestions([]);
                setOpen(false);
                setHighlightedIdx(-1);
                if (onSelect) onSelect(assoc);
            };

            return (
                <div className="autocomplete-wrapper">
                    <input
                        type="text"
                        className={className}
                        value={(lastFirst && !focused) ? formatLastFirst(value) : value}
                        placeholder={placeholder}
                        disabled={disabled}
                        onChange={(e) => {
                            onChange(e.target.value);
                            const s = buildSuggestions(e.target.value);
                            setSuggestions(s);
                            setOpen(s.length > 0);
                            setHighlightedIdx(-1);
                        }}
                        onKeyDown={(e) => {
                            if (e.key === 'ArrowDown' && open) { e.preventDefault(); setHighlightedIdx(i => Math.min(i + 1, suggestions.length - 1)); return; }
                            if (e.key === 'ArrowUp'   && open) { e.preventDefault(); setHighlightedIdx(i => Math.max(i - 1, 0)); return; }
                            if (e.key === 'Tab' && open && suggestions.length > 0) {
                                const target = highlightedIdx >= 0 ? suggestions[highlightedIdx] : suggestions[0];
                                if (target) { e.preventDefault(); selectSuggestion(target); return; }
                            }
                            if (e.key === 'Enter') {
                                if (open && highlightedIdx >= 0) { e.preventDefault(); selectSuggestion(suggestions[highlightedIdx]); return; }
                                if (onEnter && value.trim()) { e.preventDefault(); onEnter(value.trim()); return; }
                            }
                            if (e.key === 'Escape') { setOpen(false); setHighlightedIdx(-1); }
                        }}
                        onBlur={() => { setFocused(false); setTimeout(() => setOpen(false), 150); }}
                        onFocus={() => {
                            setFocused(true);
                            if (value && value.length >= 2) {
                                const s = buildSuggestions(value);
                                setSuggestions(s);
                                setOpen(s.length > 0);
                            }
                        }}
                    />
                    {open && suggestions.length > 0 && (
                        <div className="autocomplete-dropdown">
                            {suggestions.map((a, i) => (
                                <div
                                    key={a.employeeId}
                                    className={`autocomplete-item${i === highlightedIdx ? ' highlighted' : ''}`}
                                    onMouseDown={(e) => e.preventDefault()}
                                    onClick={() => selectSuggestion(a)}
                                    onMouseEnter={() => setHighlightedIdx(i)}
                                    style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '8px' }}
                                >
                                    <span>{a.fullName}</span>
                                    {a.lastLine && (
                                        <span style={{ fontSize: '10px', padding: '1px 6px', borderRadius: '8px', background: '#667eea', color: 'white', fontWeight: '600', flexShrink: 0 }}>
                                            Line {a.lastLine}
                                        </span>
                                    )}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        function LineColumn({ line, isLocked, coreAssociates, roster, selectMode, selectedPositions, onTogglePositionSelect, onUpdatePosition, onUpdateLine, onRemoveLine, onToggleCutLine, onDragStart, onDragOver, onDrop, statusNameIndex, workHistoryIndex, lastFirst }) {
            const [isEditing, setIsEditing] = useState(false);
            const [editLetter, setEditLetter] = useState(line.letter);
            const [editLeads, setEditLeads] = useState((line.leads || []).join(', '));
            const [editNeeded, setEditNeeded] = useState(line.needed);

            const filledCount = line.positions.filter(p => p.name.trim() && !p.isCrescent).length;
            const crescentCount = line.positions.filter(p => p.isCrescent && p.name.trim()).length;
            const leads = line.leads || (line.lead ? [line.lead] : []);

            const handleSaveEdit = () => {
                const newLeadsArray = editLeads.split(',').map(l => l.trim()).filter(l => l);
                const oldLeadsArray = line.leads || [];
                const newNeeded = parseInt(editNeeded) || line.needed;

                // Find added and removed leads
                const addedLeads = newLeadsArray.filter(l => !oldLeadsArray.includes(l));
                const removedLeads = oldLeadsArray.filter(l => !newLeadsArray.includes(l));

                // Collect core members to add from new leads (split into regular and Crescent)
                const coreToAdd = [];
                const crescentToAdd = [];
                const ca = coreAssociates || {};
                addedLeads.forEach(lead => {
                    let members = ca[lead];
                    if (!members) {
                        const matchKey = Object.keys(ca).find(k => k.toLowerCase() === lead.toLowerCase());
                        members = matchKey ? ca[matchKey] : [];
                    }
                    members.forEach(m => {
                        // Don't add if already on this line
                        if (!line.positions.some(p => p.name.trim().toLowerCase() === m.name.trim().toLowerCase())) {
                            if ((m.flags || []).includes('crescent')) {
                                crescentToAdd.push(m.name);
                            } else {
                                coreToAdd.push(m.name);
                            }
                        }
                    });
                });

                // Collect core member names from removed leads
                const coreToRemove = [];
                removedLeads.forEach(lead => {
                    let members = ca[lead];
                    if (!members) {
                        const matchKey = Object.keys(ca).find(k => k.toLowerCase() === lead.toLowerCase());
                        members = matchKey ? ca[matchKey] : [];
                    }
                    members.forEach(m => {
                        // Only remove if they're actually on this line
                        if (line.positions.some(p => p.name.trim().toLowerCase() === m.name.trim().toLowerCase())) {
                            coreToRemove.push(m.name.toLowerCase());
                        }
                    });
                });

                // Handle removed leads' core members
                let updatedPositions = [...line.positions];
                let crescentRemovedCount = 0;
                if (coreToRemove.length > 0) {
                    const shouldRemove = confirm(
                        `The following core members belong to removed lead(s):\n${coreToRemove.map(n => '  - ' + n).join('\n')}\n\nRemove them from this line?`
                    );
                    if (shouldRemove) {
                        // Count crescent being removed so we can add them back to the needed total
                        crescentRemovedCount = line.positions.filter(p =>
                            p.isCrescent && p.name.trim() && coreToRemove.includes(p.name.trim().toLowerCase())
                        ).length;
                        updatedPositions = updatedPositions.map(p => {
                            if (coreToRemove.includes(p.name.trim().toLowerCase())) {
                                return { ...p, name: '', isNew: false, isCrescent: false };
                            }
                            return p;
                        });
                    }
                }

                // Separate regular and Crescent positions for independent management
                let regularPositions = updatedPositions.filter(p => !p.isCrescent);
                let crescentPositions = updatedPositions.filter(p => p.isCrescent);

                // Deduct newly-added crescent from the needed count (and restore for any removed crescent)
                const adjustedNeeded = Math.max(0, newNeeded - crescentToAdd.length + crescentRemovedCount);

                // Handle added leads' regular core members - fill empty regular slots
                if (coreToAdd.length > 0) {
                    let addIndex = 0;
                    let totalNeeded = adjustedNeeded;
                    const currentFilled = regularPositions.filter(p => p.name.trim()).length;
                    const emptySlots = regularPositions.filter(p => !p.name.trim()).length;

                    if (coreToAdd.length > emptySlots) {
                        totalNeeded = Math.max(adjustedNeeded, currentFilled + coreToAdd.length);
                    }

                    regularPositions = regularPositions.map(p => {
                        if (!p.name.trim() && addIndex < coreToAdd.length) {
                            const name = coreToAdd[addIndex];
                            addIndex++;
                            return { ...p, name, isNew: false, isCrescent: false };
                        }
                        return p;
                    });

                    while (addIndex < coreToAdd.length) {
                        regularPositions.push({
                            id: Date.now() + Math.random() + addIndex,
                            name: coreToAdd[addIndex],
                            isNew: false,
                            isCrescent: false
                        });
                        addIndex++;
                        totalNeeded = Math.max(totalNeeded, regularPositions.length);
                    }

                    if (totalNeeded > adjustedNeeded) {
                        // Append any new Crescent members from added leads
                        crescentToAdd.forEach((name, idx) => {
                            crescentPositions.push({
                                id: Date.now() + Math.random() + idx + 9000,
                                name,
                                isNew: false,
                                isCrescent: true
                            });
                        });
                        onUpdateLine(line.id, {
                            letter: editLetter,
                            leads: newLeadsArray,
                            needed: totalNeeded,
                            positions: [...regularPositions, ...crescentPositions]
                        });
                        setEditNeeded(totalNeeded);
                        setIsEditing(false);
                        return;
                    }
                }

                // Append new Crescent members from added leads
                crescentToAdd.forEach((name, idx) => {
                    crescentPositions.push({
                        id: Date.now() + Math.random() + idx + 9000,
                        name,
                        isNew: false,
                        isCrescent: true
                    });
                });

                // Adjust regular positions array for needed count changes
                if (adjustedNeeded > regularPositions.length) {
                    const additionalPositions = Array(adjustedNeeded - regularPositions.length)
                        .fill(null)
                        .map((_, idx) => ({
                            id: Date.now() + Math.random() + idx,
                            name: '',
                            isNew: false,
                            isCrescent: false
                        }));
                    regularPositions = [...regularPositions, ...additionalPositions];
                } else if (adjustedNeeded < regularPositions.length) {
                    const wouldLose = regularPositions.slice(adjustedNeeded).filter(p => p.name.trim());
                    if (wouldLose.length > 0) {
                        const names = wouldLose.map(p => p.name).join(', ');
                        if (!confirm(`Reducing positions will remove: ${names}\n\nContinue?`)) {
                            setIsEditing(false);
                            return;
                        }
                    }
                    regularPositions = regularPositions.slice(0, adjustedNeeded);
                }

                onUpdateLine(line.id, {
                    letter: editLetter,
                    leads: newLeadsArray,
                    needed: adjustedNeeded,
                    positions: [...regularPositions, ...crescentPositions]
                });
                setEditNeeded(adjustedNeeded);
                setIsEditing(false);
            };

            const handleCancelEdit = () => {
                setEditLetter(line.letter);
                setEditLeads((line.leads || []).join(', '));
                setEditNeeded(line.needed);
                setIsEditing(false);
            };

            return (
                <div className={`line-column ${line.isCut ? 'cut' : ''}`} style={{ position: 'relative' }}>
                    {line.isCut && <div className="cut-badge">CUT</div>}
                    <div className="line-header">
                        {!isEditing ? (
                            <>
                                <div className="line-letter">Line {line.letter || '?'}</div>
                                <div className="line-lead">
                                    {leads.length > 0 ? leads.join(', ') : 'No lead'}
                                </div>
                                <div className="line-stats">
                                    {filledCount} / {line.needed} filled
                                    {crescentCount > 0 && <span style={{ color: '#831843', marginLeft: '4px' }}>+{crescentCount}C</span>}
                                </div>
                                <div className="line-edit-controls">
                                    <button
                                        className="btn btn-secondary btn-small"
                                        onClick={() => onToggleCutLine(line.id)}
                                        disabled={isLocked}
                                        style={{ fontSize: '10px', padding: '3px 6px', background: line.isCut ? '#10b981' : '#ef4444', color: 'white', border: 'none', opacity: isLocked ? 0.5 : 1 }}
                                    >
                                        {line.isCut ? 'Restore' : 'Cut'}
                                    </button>
                                    <button
                                        className="btn btn-secondary btn-small"
                                        onClick={() => setIsEditing(true)}
                                        disabled={isLocked}
                                        style={{ fontSize: '10px', padding: '3px 6px', opacity: isLocked ? 0.5 : 1 }}
                                    >
                                        Edit
                                    </button>
                                    <button
                                        className="btn btn-danger btn-small"
                                        onClick={() => onRemoveLine(line.id)}
                                        disabled={isLocked}
                                        style={{ fontSize: '10px', padding: '3px 6px', opacity: isLocked ? 0.5 : 1 }}
                                    >
                                        Remove
                                    </button>
                                </div>
                            </>
                        ) : (
                            <>
                                <div style={{ fontSize: '10px', marginBottom: '4px', opacity: 0.9 }}>Edit Line</div>
                                <input
                                    type="text"
                                    className="line-edit-input"
                                    value={editLetter}
                                    onChange={(e) => setEditLetter(e.target.value.toUpperCase())}

                            const crescentIndex = position.isCrescent
                                ? line.positions.slice(0, index).filter(p => p.isCrescent).length + 1
                                : null;
                            const posStatus = lookupNameStatus(statusNameIndex, position.name);
                            const leadHint = lookupWorkHistory(workHistoryIndex, position.name);
                            const leadDiff = leadHint && !(line.leads || []).some(l =>
                                leadHint.leads.some(hl => normalizeName(hl) === normalizeName(l)));

                            return (
                                <React.Fragment key={position.id}>

                                        onDragOver={selectMode ? null : onDragOver}
                                        onDrop={(e) => (isLocked || selectMode) ? e.preventDefault() : onDrop(e, { type: 'position', lineId: line.id, positionId: position.id })}
                                        style={{ cursor: isLocked ? 'not-allowed' : selectMode ? 'pointer' : (position.name.trim() && !line.isCut ? 'grab' : 'default'), position: 'relative' }}

                                            <input type="checkbox" className="bulk-checkbox"

                                                onClick={(e) => e.stopPropagation()}

                    // Second confirmation to prevent accidental click-through

                    if (!doubleConfirmed) return;

                if (isFirebaseConfigured && db) {
                    try {
                        const snapshot = await db.ref('staffing/' + docId).once('value');
                        existsInFirebase = snapshot.exists();
