        function ComparisonView({ reports, onClose }) {
            const [shiftA, setShiftA] = useState('');
            const [shiftB, setShiftB] = useState('');

            const reportA = reports.find(r => r.id === shiftA);
            const reportB = reports.find(r => r.id === shiftB);

            const getNamesFromReport = (report) => {
                if (!report) return new Set();
                const names = new Set();
                (report.lines || []).forEach(l => {
                    if (!l.isCut) {
                        l.positions.forEach(p => {
                            if (p.name && p.name.trim()) names.add(p.name.trim().toLowerCase());
                        });
                    }
                });
                return names;
            };

            const namesA = getNamesFromReport(reportA);
            const namesB = getNamesFromReport(reportB);
            const allNames = new Set([...namesA, ...namesB]);
            const added = [...allNames].filter(n => !namesA.has(n) && namesB.has(n));
            const removed = [...allNames].filter(n => namesA.has(n) && !namesB.has(n));
            const same = [...allNames].filter(n => namesA.has(n) && namesB.has(n));

            return (
                <div>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
                        <h3>Compare Shifts</h3>
                        <button className="btn btn-secondary btn-small" onClick={onClose}>Back to Reports</button>
                    </div>

                    <div className="form-grid" style={{ marginBottom: '16px' }}>
                        <div className="form-group">
                            <label>Shift A (Before)</label>
                            <select value={shiftA} onChange={(e) => setShiftA(e.target.value)}>
                                <option value="">-- Select --</option>
                                {reports.map(r => (
                                    <option key={r.id} value={r.id}>{r.date} - {r.shift}</option>
                                ))}
                            </select>
                        </div>
                        <div className="form-group">
                            <label>Shift B (After)</label>
                            <select value={shiftB} onChange={(e) => setShiftB(e.target.value)}>
                                <option value="">-- Select --</option>
                                {reports.map(r => (
                                    <option key={r.id} value={r.id}>{r.date} - {r.shift}</option>
                                ))}
                            </select>
                        </div>
                    </div>

                    {reportA && reportB && (
                        <>
                            <div className="comparison-stats">
                                <div className="comparison-stat" style={{ background: '#d1fae5', color: '#065f46' }}>
                                    +{added.length} Added
                                </div>
                                <div className="comparison-stat" style={{ background: '#fee2e2', color: '#991b1b' }}>
                                    -{removed.length} Removed
                                </div>
                                <div className="comparison-stat" style={{ background: '#f3f4f6', color: '#374151' }}>
                                    {same.length} Same
                                </div>
                            </div>

                            <div className="comparison-container">
                                <div className="comparison-side">
                                    <h4>{reportA.date} - {reportA.shift} Shift</h4>
                                    {(reportA.lines || []).filter(l => !l.isCut).map((line, i) => (
                                        <div key={i} className="comparison-line">
                                            <strong style={{ fontSize: '12px' }}>Line {line.letter}</strong>
                                            {line.positions.filter(p => p.name && p.name.trim()).map((p, j) => {
                                                const inB = namesB.has(p.name.trim().toLowerCase());
                                                return <span key={j} className={`comparison-name ${inB ? 'same' : 'removed'}`}>{p.name}</span>;
                                            })}
                                        </div>
                                    ))}
                                </div>
                                <div className="comparison-side">
                                    <h4>{reportB.date} - {reportB.shift} Shift</h4>
                                    {(reportB.lines || []).filter(l => !l.isCut).map((line, i) => (
                                        <div key={i} className="comparison-line">
                                            <strong style={{ fontSize: '12px' }}>Line {line.letter}</strong>
                                            {line.positions.filter(p => p.name && p.name.trim()).map((p, j) => {
                                                const inA = namesA.has(p.name.trim().toLowerCase());
                                                return <span key={j} className={`comparison-name ${inA ? 'same' : 'added'}`}>{p.name}</span>;
                                            })}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </>
                    )}

                    {(!reportA || !reportB) && (
                        <div className="empty-state">
                            <p>Select two shifts above to compare them side by side.</p>
                        </div>
                    )}
                </div>
            );
        }

        function AnalyticsView() {
            const [reports, setReports] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                loadAllReports();
            }, []);

            const loadAllReports = async () => {
                setLoading(true);
                const reportsList = [];
                const seenIds = new Set();

                if (isFirebaseConfigured && db) {
                    try {
                        const snapshot = await db.ref('staffing').once('value');
                        if (snapshot.exists()) {
                            const data = snapshot.val();
                            Object.keys(data).forEach(docId => {
                                reportsList.push({ id: docId, ...data[docId] });
                                seenIds.add(docId);
                            });
                        }
                    } catch (error) {
                        console.error('Error loading analytics data:', error);
                    }
                }

                Object.keys(localStorage)
                    .filter(key => key.startsWith('staffing_') && !key.includes('coreAssociates'))
                    .forEach(key => {
                        const data = storage.load(key);
                        if (data && data.date) {
                            const id = data.date + '_' + data.shift;
                            if (!seenIds.has(id)) {
                                reportsList.push({ id: id, ...data });
                                seenIds.add(id);
                            }
                        }
                    });

                reportsList.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
                setReports(reportsList);
                setLoading(false);
            };

            if (loading) {
                return (
                    <div className="empty-state">
                        <p>Loading analytics...</p>
                    </div>
                );
            }

            if (reports.length === 0) {
                return (
                    <div className="empty-state">
                        <h3>No Data Available</h3>
                        <p>Analytics will appear once you have saved staffing sheets.</p>
                    </div>
                );
            }

            // Calculate summary stats
            const totalShifts = reports.length;

            const fillRates = reports.map(r => {
                const lines = (r.lines || []).filter(l => !l.isCut);
                const total = lines.reduce((s, l) => s + (l.needed || l.positions.length), 0);
                const filled = lines.reduce((s, l) => s + l.positions.filter(p => p.name && p.name.trim()).length, 0);
                return total > 0 ? (filled / total) * 100 : 0;
            });
            const avgFillRate = fillRates.length > 0 ? (fillRates.reduce((a, b) => a + b, 0) / fillRates.length) : 0;

            // Most common line letters
            const letterCounts = {};
            reports.forEach(r => {
                (r.lines || []).forEach(l => {
                    const letter = l.letter || '?';
                    letterCounts[letter] = (letterCounts[letter] || 0) + 1;
                });
            });
            const topLetters = Object.entries(letterCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3)
                .map(([letter]) => letter)
                .join(', ');

            // Total unique associates
            const uniqueNames = new Set();
            reports.forEach(r => {
                (r.lines || []).forEach(l => l.positions.forEach(p => { if (p.name && p.name.trim()) uniqueNames.add(p.name.trim()); }));
                (r.waitlist || []).forEach(w => { if (w.name && w.name.trim()) uniqueNames.add(w.name.trim()); });
            });

            // Fill rate by week
            const getWeekKey = (dateStr) => {
                const d = new Date(dateStr + 'T00:00:00');
                const yearStart = new Date(d.getFullYear(), 0, 1);
                const weekNum = Math.ceil(((d - yearStart) / 86400000 + yearStart.getDay() + 1) / 7);
                return d.getFullYear() + '-W' + String(weekNum).padStart(2, '0');
            };

            const weeklyRates = {};
            reports.forEach((r, idx) => {
                const week = getWeekKey(r.date || '2000-01-01');
                if (!weeklyRates[week]) weeklyRates[week] = [];
                weeklyRates[week].push(fillRates[idx]);
            });

            const weeklyAvg = Object.entries(weeklyRates)
                .map(([week, rates]) => ({
                    week,
                    avg: rates.reduce((a, b) => a + b, 0) / rates.length
                }))
                .sort((a, b) => a.week.localeCompare(b.week));

            const maxWeeklyRate = Math.max(...weeklyAvg.map(w => w.avg), 1);

            // Line frequency
            const sortedLetters = Object.entries(letterCounts).sort((a, b) => b[1] - a[1]);
            const maxLetterCount = sortedLetters.length > 0 ? sortedLetters[0][1] : 1;

            // Associate frequency
            const assocFreq = {};
            reports.forEach(r => {
                (r.lines || []).forEach(l => {
                    l.positions.forEach(p => {
                        if (p.name && p.name.trim()) {
                            const name = p.name.trim();
                            if (!assocFreq[name]) assocFreq[name] = { count: 0, lastDate: '' };
                            assocFreq[name].count++;
                            if ((r.date || '') > assocFreq[name].lastDate) assocFreq[name].lastDate = r.date || '';
                        }
                    });
                });
                (r.waitlist || []).forEach(w => {
                    if (w.name && w.name.trim()) {
                        const name = w.name.trim();
                        if (!assocFreq[name]) assocFreq[name] = { count: 0, lastDate: '' };
                        assocFreq[name].count++;
                        if ((r.date || '') > assocFreq[name].lastDate) assocFreq[name].lastDate = r.date || '';
                    }
                });
            });
            const sortedAssocs = Object.entries(assocFreq)
                .sort((a, b) => b[1].count - a[1].count);

            return (
                <div>
                    <h3 style={{ marginBottom: '16px' }}>Historical Analytics</h3>

                    <div className="analytics-cards">
                        <div className="analytics-card">
                            <h4>{totalShifts}</h4>
                            <p>Total Shifts Tracked</p>
                        </div>
                        <div className="analytics-card">
                            <h4>{avgFillRate.toFixed(1)}%</h4>
                            <p>Average Fill Rate</p>
                        </div>
                        <div className="analytics-card">
                            <h4>{topLetters || 'N/A'}</h4>
                            <p>Most Common Lines</p>
                        </div>
                        <div className="analytics-card">
                            <h4>{uniqueNames.size}</h4>
                            <p>Total Unique Associates</p>
                        </div>
                    </div>

                    <div style={{ marginBottom: '24px' }}>
                        <h4 style={{ fontSize: '14px', marginBottom: '12px', color: '#111827' }}>Fill Rate by Week</h4>
                        {weeklyAvg.length === 0 ? (
                            <p style={{ color: '#6b7280', fontSize: '12px' }}>No weekly data available.</p>
                        ) : (
                            <div className="bar-chart">
                                {weeklyAvg.map(w => (
                                    <div key={w.week} className="bar-row">
                                        <div className="bar-label">{w.week}</div>
                                        <div className="bar-fill" style={{ width: Math.max((w.avg / maxWeeklyRate) * 100, 5) + '%' }}>
                                            {w.avg.toFixed(1)}%
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <div style={{ marginBottom: '24px' }}>
                        <h4 style={{ fontSize: '14px', marginBottom: '12px', color: '#111827' }}>Line Frequency</h4>
                        {sortedLetters.length === 0 ? (
                            <p style={{ color: '#6b7280', fontSize: '12px' }}>No line data available.</p>
                        ) : (
                            <div className="bar-chart">
                                {sortedLetters.map(([letter, count]) => (
                                    <div key={letter} className="bar-row">
                                        <div className="bar-label">Line {letter}</div>
                                        <div className="bar-fill" style={{ width: Math.max((count / maxLetterCount) * 100, 5) + '%', background: 'linear-gradient(135deg, #f59e0b 0%, #ef4444 100%)' }}>
                                            {count}x
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <div>
                        <h4 style={{ fontSize: '14px', marginBottom: '12px', color: '#111827' }}>Associate Frequency</h4>
                        {sortedAssocs.length === 0 ? (
                            <p style={{ color: '#6b7280', fontSize: '12px' }}>No associate data available.</p>
                        ) : (
                            <div style={{ overflowX: 'auto' }}>
                                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '12px' }}>
                                    <thead>
                                        <tr style={{ background: '#f3f4f6' }}>
                                            <th style={{ textAlign: 'left', padding: '8px 12px', borderBottom: '1px solid #e5e7eb' }}>Name</th>
                                            <th style={{ textAlign: 'center', padding: '8px 12px', borderBottom: '1px solid #e5e7eb' }}>Shifts Assigned</th>
                                            <th style={{ textAlign: 'center', padding: '8px 12px', borderBottom: '1px solid #e5e7eb' }}>Last Date</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {sortedAssocs.slice(0, 50).map(([name, info]) => (
                                            <tr key={name} style={{ borderBottom: '1px solid #f3f4f6' }}>
                                                <td style={{ padding: '6px 12px' }}>{name}</td>
                                                <td style={{ textAlign: 'center', padding: '6px 12px', fontWeight: '600', color: '#667eea' }}>{info.count}</td>
                                                <td style={{ textAlign: 'center', padding: '6px 12px', color: '#6b7280' }}>{info.lastDate}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                                {sortedAssocs.length > 50 && (
                                    <p style={{ textAlign: 'center', padding: '8px', color: '#6b7280', fontSize: '11px' }}>
                                        Showing top 50 of {sortedAssocs.length} associates
                                    </p>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function RosterView({ roster, onSyncRoster, onUpdateAssociate, statusList, statusMeta, onStatusUpload, workHistoryIndex }) {
            const [search, setSearch] = useState('');
            const [filterStatus, setFilterStatus] = useState('active');
            const [filterShift, setFilterShift] = useState('all');
            const [syncStatus, setSyncStatus] = useState('');
            const [lastSync, setLastSync] = useState(null);
            const [syncPreview, setSyncPreview] = useState(null);
            const fileRef = useRef(null);
            const statusFileRef = useRef(null);
            const [statusUploadStatus, setStatusUploadStatus] = useState('');
            const [scanValue, setScanValue] = useState('');
            const [scanResult, setScanResult] = useState(null);
            const scanRef = useRef(null);

            // Suspension/DNR status for a roster associate, matched on numeric EID.
            const disciplineFor = (a) => {
                const eid = a ? normalizeEid(a.employeeId) : '';
                const entry = eid ? (statusList || {})[eid] : null;
                return entry ? resolveEntryStatus(entry) : null;
            };

            const handleStatusFile = async (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                e.target.value = '';
                try {
                    setStatusUploadStatus('Parsing...');
                    const meta = await onStatusUpload(file);
                    setStatusUploadStatus(`Loaded ${meta.totalEntries} (${meta.blockingCount} flagged) ✓`);
                    setTimeout(() => setStatusUploadStatus(''), 5000);
                } catch (err) {
                    setStatusUploadStatus(`Error: ${err.message}`);
                    setTimeout(() => setStatusUploadStatus(''), 7000);
                }
            };

            const handleScan = () => {
                const eid = normalizeEid(scanValue);
                setScanValue('');
                scanRef.current?.focus();
                if (!eid) { setScanResult(null); return; }
                const rosterMatch = Object.values(roster || {}).find(r => normalizeEid(r.employeeId) === eid);
                const entry = (statusList || {})[eid];
                const status = entry ? resolveEntryStatus(entry) : null;
                const lookupName = (rosterMatch && rosterMatch.fullName) || (entry && entry.name) || '';
                const history = lookupName ? lookupWorkHistory(workHistoryIndex, lookupName) : null;
                let cls = 'unknown', headline = 'NOT ON LIST';
                if (status && (status.kind === 'dnr' || status.kind === 'terminated')) { cls = 'block'; headline = status.label; }
                else if (status && status.kind === 'suspended') { cls = 'suspend'; headline = status.label; }
                else if (rosterMatch && !rosterMatch.isActive) { cls = 'block'; headline = 'INACTIVE — not on active roster'; }
                else if (rosterMatch || entry) { cls = 'clear'; headline = 'OK TO WORK'; }
                setScanResult({
                    eid, cls, headline,
                    name: lookupName || '(not on file)',
                    detail: rosterMatch ? (rosterMatch.isActive ? 'Active roster' : 'Inactive') : (entry ? 'Not on roster' : ''),
                    lastLead: history ? `${history.leadLabel} (${history.date}, Line ${history.letter})` : null
                });
            };

            useEffect(() => {
                if (isFirebaseConfigured && db) {
                    db.ref('roster/lastSync').once('value').then(snap => {
                        if (snap.exists()) setLastSync(snap.val());
                    }).catch(() => {});
                }
                const saved = storage.load('rosterLastSync', null);
                if (saved && !lastSync) setLastSync(saved);
            }, []);

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                fileRef.current.value = '';
                setSyncStatus('Parsing file...');
                setSyncPreview(null);
                try {
                    const data = await file.arrayBuffer();
                    const wb = XLSX.read(data, { type: 'array' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
                    if (rows.length === 0) { setSyncStatus('Error: No data rows found in file'); return; }

                    const headers = Object.keys(rows[0]);
                    const findCol = (opts) => headers.find(h => opts.some(o => h.toLowerCase().replace(/[\s_-]/g, '').includes(o.toLowerCase().replace(/[\s_-]/g, ''))));
                    const idCol    = findCol(['employeeid', 'empid', 'employee#', 'employeenumber', 'badgeid', 'id', 'legacycontactid', 'personplacedlegacy']);
                    const fullNameCol = findCol(['fullname', 'personplacedname', 'personplaced', 'associate']);
                    const firstCol = !fullNameCol ? findCol(['firstname', 'first', 'fname', 'givenname']) : null;
                    const lastCol  = !fullNameCol ? findCol(['lastname', 'last', 'lname', 'surname', 'familyname']) : null;
                    const shiftCol = findCol(['shift', 'assignedshift', 'workshift']);

                    if (!idCol || (!fullNameCol && (!firstCol || !lastCol))) {
                        setSyncStatus(`Error: Missing columns. Need Employee ID and Name. Found: ${headers.join(', ')}`);
                        return;
                    }

                    const fileAssociates = {};
                    rows.forEach(row => {
                        const empId = String(row[idCol] || '').trim();
                        if (!empId) return;
                        let firstName, lastName, fullName;
                        if (fullNameCol) {
                            fullName = String(row[fullNameCol] || '').trim();
                            if (!fullName) return;
                            if (fullName.includes(',')) {
                                const parts = fullName.split(',');
                                lastName = parts[0].trim(); firstName = parts.slice(1).join(',').trim();
                            } else {
                                const sp = fullName.indexOf(' ');
                                firstName = sp !== -1 ? fullName.slice(0, sp).trim() : fullName;
                                lastName  = sp !== -1 ? fullName.slice(sp + 1).trim() : '';
                            }
                        } else {
                            firstName = String(row[firstCol] || '').trim();
                            lastName  = String(row[lastCol]  || '').trim();
                            fullName  = `${firstName} ${lastName}`.trim();
                            if (!firstName) return;
                        }
                        const assignedShift = shiftCol ? String(row[shiftCol] || '').trim() || null : null;
                        fileAssociates[empId] = { employeeId: empId, firstName, lastName, fullName, isActive: true, assignedShift };
                    });

                    const fileIds = new Set(Object.keys(fileAssociates));
                    const currentRoster = roster || {};
                    const currentIds = new Set(Object.keys(currentRoster));
                    const newCount      = [...fileIds].filter(id => !currentIds.has(id)).length;
                    const inactiveCount = [...currentIds].filter(id => currentRoster[id].isActive && !fileIds.has(id)).length;
                    const updatedCount  = [...fileIds].filter(id => currentIds.has(id)).length;

                    setSyncPreview({ fileAssociates, newCount, inactiveCount, updatedCount, total: fileIds.size });
                    setSyncStatus('');
                } catch (err) {
                    setSyncStatus(`Error: ${err.message}`);
                }
            };

            const confirmSync = async () => {
                const { fileAssociates } = syncPreview;
                setSyncStatus('Syncing...');
                try {
                    const currentRoster = roster || {};
                    const fileIds = new Set(Object.keys(fileAssociates));
                    const updatedRoster = {};
                    // Merge file data into existing records, preserving lastLine/lastShift
                    fileIds.forEach(id => {
                        const existing = currentRoster[id] || {};
                        updatedRoster[id] = {
                            ...existing,
                            ...fileAssociates[id],
                            lastLine:  existing.lastLine  || null,
                            lastShift: existing.lastShift || null,
                        };
                    });
                    Object.entries(currentRoster).forEach(([id, assoc]) => {
                        if (!fileIds.has(id)) updatedRoster[id] = { ...assoc, isActive: false };
                    });
                    const syncTime = new Date().toISOString();
                    if (isFirebaseConfigured && db) {
                        await db.ref('roster').set({ associates: updatedRoster, lastSync: syncTime });
                    }
                    storage.save('roster', updatedRoster);
                    storage.save('rosterLastSync', syncTime);
                    onSyncRoster(updatedRoster);
                    setLastSync(syncTime);
                    setSyncPreview(null);
                    const added = Object.values(updatedRoster).filter(a => a.isActive).length;
                    setSyncStatus(`Synced — ${added} active associates`);
                    setTimeout(() => setSyncStatus(''), 5000);
                } catch (err) {
                    setSyncStatus(`Error: ${err.message}`);
                }
            };

            const rosterList = Object.values(roster || {});
            const filtered = rosterList.filter(a => {
                if (filterStatus === 'active'   && !a.isActive)  return false;
                if (filterStatus === 'inactive' && a.isActive)   return false;
                if (filterStatus === 'flagged'  && !disciplineFor(a)) return false;
                if (filterShift !== 'all' && (a.assignedShift || '') !== filterShift) return false;
                if (search.trim() && !a.fullName.toLowerCase().includes(search.toLowerCase()) && !String(a.employeeId).includes(search)) return false;
                return true;
            }).sort((a, b) => a.fullName.localeCompare(b.fullName));

            const activeCount   = rosterList.filter(a => a.isActive).length;
            const inactiveCount = rosterList.filter(a => !a.isActive).length;
            const flaggedCount  = rosterList.filter(a => disciplineFor(a)).length;
            const statusUpdated = statusMeta && statusMeta.updatedAt ? new Date(statusMeta.updatedAt) : null;

            return (
                <div className="roster-container">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '16px', flexWrap: 'wrap', gap: '8px' }}>
                        <div>
                            <h3 style={{ margin: 0, fontSize: '16px', color: '#1f2937' }}>Associate Roster</h3>
                            {lastSync
                                ? <div style={{ fontSize: '11px', color: '#9ca3af', marginTop: '2px' }}>Last synced: {new Date(lastSync).toLocaleString()}</div>
                                : <div style={{ fontSize: '11px', color: '#9ca3af', marginTop: '2px' }}>No roster synced yet</div>
                            }
                        </div>
                        <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                            {syncStatus && (
                                <span style={{ fontSize: '12px', color: syncStatus.startsWith('Error') ? '#dc2626' : '#059669', fontWeight: '600' }}>
                                    {syncStatus}
                                </span>
                            )}
                            <input ref={fileRef} type="file" accept=".csv,.xlsx,.xls" style={{ display: 'none' }} onChange={handleFileUpload} />
                            <button className="btn btn-primary" onClick={() => fileRef.current.click()}>
                                Upload Roster File
                            </button>
                            <input ref={statusFileRef} type="file" accept=".xlsx,.xls" style={{ display: 'none' }} onChange={handleStatusFile} />
                            <button className="btn btn-secondary" onClick={() => statusFileRef.current.click()} title="Upload the suspension / DNR tracking sheet">
                                Upload Tracking Sheet
                            </button>
                            {statusUploadStatus && (
                                <span style={{ fontSize: '12px', color: statusUploadStatus.startsWith('Error') ? '#dc2626' : '#059669', fontWeight: '600' }}>{statusUploadStatus}</span>
                            )}
                        </div>
                    </div>

                    <div className="scan-box" style={{ marginBottom: '16px' }}>
                        <div style={{ fontSize: '13px', fontWeight: 700, marginBottom: '6px' }}>🔎 Scan badge or type EID</div>
                        <input
                            ref={scanRef}
                            className="scan-input"
                            value={scanValue}
                            onChange={(e) => setScanValue(e.target.value)}
                            onKeyDown={(e) => { if (e.key === 'Enter') handleScan(); }}
                            placeholder="Scan badge…"
                            autoComplete="off"
                        />
                        {scanResult && (
                            <div className={`scan-banner ${scanResult.cls}`}>
                                {scanResult.name && <div className="scan-name">{scanResult.name}</div>}
                                <div className="scan-status">{scanResult.headline}</div>
                                <div className="scan-detail">EID {scanResult.eid}{scanResult.detail ? ` · ${scanResult.detail}` : ''}</div>
                                {scanResult.lastLead && <div className="scan-detail">↳ Usually works for: <strong>{scanResult.lastLead}</strong></div>}
                            </div>
                        )}
                        <div style={{ fontSize: '11px', color: '#9ca3af', marginTop: '8px' }}>
                            {statusUpdated
                                ? <>Suspension/DNR list updated {statusUpdated.toLocaleString()}{statusMeta && statusMeta.source ? ` · ${statusMeta.source}` : ''}</>
                                : 'No suspension/DNR list loaded — upload the tracking sheet or check the daily sync.'}
                        </div>
                    </div>

                    {syncPreview && (
                        <div className="sync-preview-box">
                            <div style={{ fontWeight: '700', marginBottom: '8px', color: '#92400e', fontSize: '13px' }}>Roster Sync Preview</div>
                            <div style={{ display: 'flex', gap: '24px', flexWrap: 'wrap', fontSize: '13px', color: '#374151', marginBottom: '12px' }}>
                                <span>Total in file: <strong>{syncPreview.total}</strong></span>
                                <span style={{ color: '#059669' }}>New associates: <strong>{syncPreview.newCount}</strong></span>
                                <span>Already in roster: <strong>{syncPreview.updatedCount}</strong></span>
                                <span style={{ color: '#dc2626' }}>Will become inactive: <strong>{syncPreview.inactiveCount}</strong></span>
                            </div>
                            <div style={{ display: 'flex', gap: '8px' }}>
                                <button className="btn btn-success" onClick={confirmSync}>Confirm Sync</button>
                                <button className="btn btn-secondary" onClick={() => setSyncPreview(null)}>Cancel</button>
                            </div>
                        </div>
                    )}

                    <div className="roster-stats">
                        <div className="roster-stat-box">
                            <div className="stat-num" style={{ color: '#059669' }}>{activeCount}</div>
                            <div className="stat-label">ACTIVE</div>
                        </div>
                        <div className="roster-stat-box">
                            <div className="stat-num" style={{ color: '#dc2626' }}>{inactiveCount}</div>
                            <div className="stat-label">INACTIVE</div>
                        </div>
                        <div className="roster-stat-box">
                            <div className="stat-num">{rosterList.length}</div>
                            <div className="stat-label">TOTAL</div>
                        </div>
                        <div className="roster-stat-box">
                            <div className="stat-num" style={{ color: '#9a3412' }}>{flaggedCount}</div>
                            <div className="stat-label">SUSP / DNR</div>
                        </div>
                    </div>

                    <div style={{ display: 'flex', gap: '8px', marginBottom: '12px', flexWrap: 'wrap' }}>
                        <input
                            type="text"
                            className="waitlist-input"
                            style={{ flex: 1, minWidth: '200px' }}
                            placeholder="Search by name or Employee ID..."
                            value={search}
                            onChange={(e) => setSearch(e.target.value)}
                        />
                        <select
                            style={{ padding: '6px 10px', border: '1px solid #d1d5db', borderRadius: '4px', fontSize: '12px', background: 'white' }}
                            value={filterStatus}
                            onChange={(e) => setFilterStatus(e.target.value)}
                        >
                            <option value="all">All</option>
                            <option value="active">Active only</option>
                            <option value="inactive">Inactive only</option>
                            <option value="flagged">Flagged (susp/DNR)</option>
                        </select>
                        <select
                            style={{ padding: '6px 10px', border: '1px solid #d1d5db', borderRadius: '4px', fontSize: '12px', background: 'white' }}
                            value={filterShift}
                            onChange={(e) => setFilterShift(e.target.value)}
                        >
                            <option value="all">All shifts</option>
                            <option value="1st">1st shift</option>
                            <option value="2nd">2nd shift</option>
                            <option value="3rd">3rd shift</option>
                        </select>
                    </div>

                    {rosterList.length === 0 ? (
                        <div style={{ textAlign: 'center', padding: '48px 24px', color: '#9ca3af' }}>
                            <div style={{ fontSize: '36px', marginBottom: '8px' }}>📋</div>
                            <div style={{ fontSize: '14px', fontWeight: '600', color: '#6b7280' }}>No roster loaded</div>
                            <div style={{ fontSize: '12px', marginTop: '4px' }}>Upload a CSV or Excel file exported from your system to populate the roster.</div>
                            <div style={{ fontSize: '11px', marginTop: '8px', color: '#9ca3af' }}>Required columns: Employee ID · First Name · Last Name</div>
                        </div>
                    ) : (
                        <div style={{ overflowX: 'auto', maxHeight: '520px', overflowY: 'auto', border: '1px solid #e5e7eb', borderRadius: '6px' }}>
                            <table className="roster-table">
                                <thead>
                                    <tr>
                                        <th>Employee ID</th>
                                        <th>Name</th>
                                        <th>Status</th>
                                        <th>Susp / DNR</th>
                                        <th>Assigned Shift</th>
                                        <th>Last Line</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filtered.map(a => (
                                        <tr key={a.employeeId}>
                                            <td style={{ fontFamily: 'monospace', color: '#6b7280', fontSize: '11px' }}>{a.employeeId}</td>
                                            <td style={{ fontWeight: '500' }}>{a.fullName}</td>
                                            <td>
                                                {a.isActive
                                                    ? <span className="roster-active-badge">Active</span>
                                                    : <span className="roster-inactive-badge">Inactive</span>
                                                }
                                            </td>
                                            <td>
                                                {(() => {
                                                    const d = disciplineFor(a);
                                                    return d
                                                        ? <span className={`flag-badge ${d.className}`} title={d.label}>{d.shortLabel}</span>
                                                        : <span style={{ color: '#d1d5db' }}>—</span>;
                                                })()}
                                            </td>
                                            <td>
                                                <select
                                                    value={a.assignedShift || ''}
                                                    onChange={e => onUpdateAssociate && onUpdateAssociate(a.employeeId, { assignedShift: e.target.value || null })}
                                                    style={{ fontSize: '11px', padding: '2px 4px', border: '1px solid #d1d5db', borderRadius: '4px', background: 'white', color: '#374151' }}
                                                >
                                                    <option value="">—</option>
                                                    <option value="1st">1st</option>
                                                    <option value="2nd">2nd</option>
                                                    <option value="3rd">3rd</option>
                                                </select>
                                            </td>
                                            <td style={{ fontFamily: 'monospace', color: '#6b7280', fontSize: '11px' }}>
                                                {a.lastLine
                                                    ? <span title={a.lastShift ? `${a.lastShift} shift` : ''} style={{ fontWeight: '600', color: '#1f2937' }}>{a.lastLine}{a.lastShift ? <span style={{ fontWeight: '400', color: '#9ca3af' }}> ({a.lastShift})</span> : null}</span>
                                                    : <span style={{ color: '#d1d5db' }}>—</span>
                                                }
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            {filtered.length === 0 && (
                                <div style={{ textAlign: 'center', padding: '24px', color: '#9ca3af', fontSize: '12px' }}>No matches</div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
